<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" fill="none" role="img" aria-label="Klio — AI goal-tracking diary — multilingual Claude insights">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"><animate attributeName="stop-color" values="#7c3aed;#a855f7;#22d3ee;#7c3aed" dur="12s" repeatCount="indefinite"/></stop>
      <stop offset="0.5" stop-color="#a855f7"><animate attributeName="stop-color" values="#a855f7;#22d3ee;#7c3aed;#a855f7" dur="12s" repeatCount="indefinite"/></stop>
      <stop offset="1" stop-color="#22d3ee"><animate attributeName="stop-color" values="#22d3ee;#7c3aed;#a855f7;#22d3ee" dur="12s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="bA" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#7c3aed" stop-opacity="0.5"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <radialGradient id="bB" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <linearGradient id="vig" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b0b14"/><stop offset="1" stop-color="#050509"/></linearGradient>
    <filter id="sf" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="24"/></filter>
    <style>
    .name{font-family:'Playfair Display','Georgia','Times New Roman',serif;}
    .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono','Menlo',monospace;}
    @keyframes tw{0%,100%{opacity:.15;}50%{opacity:.85;}}
    @keyframes fl{0%,100%{opacity:.55;}50%{opacity:1;}}
    @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
    .tw{animation:tw 3.6s ease-in-out infinite;}
    .fl{animation:fl 2.6s ease-in-out infinite;}
    .bob{animation:bob 4s ease-in-out infinite;}
</style>
  </defs>

  <rect width="1200" height="240" rx="16" fill="url(#vig)"/>
  <rect x="1" y="1" width="1198" height="238" rx="15" fill="none" stroke="#1c2233"/>
  <g filter="url(#sf)">
    <ellipse cx="230" cy="90" rx="210" ry="130" fill="url(#bA)"><animateTransform attributeName="transform" type="translate" values="0 0; 50 24; -18 -8; 0 0" dur="19s" repeatCount="indefinite"/></ellipse>
    <ellipse cx="980" cy="150" rx="240" ry="150" fill="url(#bB)"><animateTransform attributeName="transform" type="translate" values="0 0; -40 -18; 24 12; 0 0" dur="23s" repeatCount="indefinite"/></ellipse>
  </g>
  <g fill="#dfe7ff">
    <circle class="tw" cx="150" cy="54" r="1.2" style="animation-delay:.2s"/>
    <circle class="tw" cx="470" cy="196" r="1.1" style="animation-delay:1.2s"/>
    <circle class="tw" cx="705" cy="60" r="1.2" style="animation-delay:.7s"/>
    <circle class="tw" cx="86" cy="150" r="1.0" style="animation-delay:2.4s"/>
  </g>

  <!-- growth streak + AI spark -->
  <g transform="translate(966 62)">
    <g stroke="url(#aurora)" stroke-width="0" fill="url(#aurora)">
      <rect x="0"   y="70" width="20" height="34" rx="4" opacity="0.5"><animate attributeName="height" values="34;40;34" dur="4s" repeatCount="indefinite"/><animate attributeName="y" values="70;64;70" dur="4s" repeatCount="indefinite"/></rect>
      <rect x="34"  y="52" width="20" height="52" rx="4" opacity="0.65"><animate attributeName="height" values="52;60;52" dur="4s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="y" values="52;44;52" dur="4s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="68"  y="34" width="20" height="70" rx="4" opacity="0.8"><animate attributeName="height" values="70;80;70" dur="4s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="y" values="34;24;34" dur="4s" begin="0.6s" repeatCount="indefinite"/></rect>
      <rect x="102" y="16" width="20" height="88" rx="4"><animate attributeName="height" values="88;98;88" dur="4s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="16;6;16" dur="4s" begin="0.9s" repeatCount="indefinite"/></rect>
    </g>
    <polyline points="10,72 44,52 78,34 112,16" fill="none" stroke="#d4af37" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <g class="fl" transform="translate(140 6)" fill="#d4af37">
      <path d="M0 -12 L3 -3 L12 0 L3 3 L0 12 L-3 3 L-12 0 L-3 -3 Z"/>
    </g>
  </g>

  <g stroke="#d4af37" stroke-width="1.4" opacity="0.8">
    <path d="M26 40 L26 24 L42 24"/><path d="M1174 40 L1174 24 L1158 24"/>
    <path d="M26 200 L26 216 L42 216"/><path d="M1174 200 L1174 216 L1158 216"/>
  </g>

  <g transform="translate(66 118)">
    <text class="name" x="0" y="0" font-size="52" font-weight="700" letter-spacing="0.5" fill="#f5f3ff">Klio</text>
    <line x1="3" y1="20" x2="360" y2="20" stroke="#d4af37" stroke-width="1.4" opacity="0.85"/>
    <text class="mono" x="3" y="48" font-size="15.5" letter-spacing="1.2" fill="#9fb3d1">AI goal-tracking diary — multilingual Claude insights</text>
    <g transform="translate(3 92)"><rect x="0" y="-17" width="82" height="26" rx="13" fill="#0e1424" stroke="url(#aurora)" stroke-opacity="0.75" stroke-width="1"/><text class="mono" x="41" y="1" font-size="12.5" letter-spacing="0.5" text-anchor="middle" fill="#c7d4ea">SwiftUI</text></g>
    <g transform="translate(97 92)"><rect x="0" y="-17" width="82" height="26" rx="13" fill="#0e1424" stroke="url(#aurora)" stroke-opacity="0.75" stroke-width="1"/><text class="mono" x="41" y="1" font-size="12.5" letter-spacing="0.5" text-anchor="middle" fill="#c7d4ea">FastAPI</text></g>
    <g transform="translate(191 92)"><rect x="0" y="-17" width="99" height="26" rx="13" fill="#0e1424" stroke="url(#aurora)" stroke-opacity="0.75" stroke-width="1"/><text class="mono" x="50" y="1" font-size="12.5" letter-spacing="0.5" text-anchor="middle" fill="#c7d4ea">Claude AI</text></g>
    <g transform="translate(303 92)"><rect x="0" y="-17" width="108" height="26" rx="13" fill="#0e1424" stroke="url(#aurora)" stroke-opacity="0.75" stroke-width="1"/><text class="mono" x="54" y="1" font-size="12.5" letter-spacing="0.5" text-anchor="middle" fill="#c7d4ea">PostgreSQL</text></g>
  </g>
</svg>
