<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" fill="none" role="img" aria-label="Klio — pastel goal-tracking diary">
<defs>
<linearGradient id="kbg" x1="0" y1="0" x2="1" y2="1">
 <stop offset="0" stop-color="#ffe1ec"/><stop offset="0.5" stop-color="#efe4fb"/><stop offset="1" stop-color="#dde6fc"/></linearGradient>
<linearGradient id="kfire" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#ff7db0"/><stop offset="0.6" stop-color="#ff8f9e"/><stop offset="1" stop-color="#ffbf74"/></linearGradient>
<linearGradient id="kink" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff7db0"/><stop offset="1" stop-color="#a06cf5"/></linearGradient>
<radialGradient id="kglow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></radialGradient>
<filter id="ksoft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="20"/></filter>
<style>@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}} .fl{animation:fl 3.4s ease-in-out infinite}</style>
</defs>
<rect width="1200" height="240" rx="20" fill="url(#kbg)"/>
<ellipse cx="300" cy="60" rx="260" ry="150" fill="url(#kglow)" filter="url(#ksoft)"/>
<!-- flame logo -->
<g transform="translate(78 78)"><g class="fl">
 <path d="M6 84 C-22 58 -6 30 8 16 C10 34 24 30 22 12 C40 26 52 50 44 74 C40 92 18 100 6 84 Z" fill="url(#kfire)"/>
 <path d="M18 78 C8 70 12 56 20 48 C22 60 30 58 30 48 C40 58 40 72 32 80 C26 86 24 84 18 78 Z" fill="#ffffff" opacity="0.55"/>
</g></g>
<!-- wordmark -->
<g transform="translate(150 96)">
 <text x="0" y="0" font-size="58" font-weight="800" fill="#2e2447" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Klio</text>
 <text x="2" y="34" font-size="16" font-weight="600" fill="#8a7fa6" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">AI goal-tracking diary — multilingual Claude insights</text>
 <g transform="translate(2 60)"><g transform="translate(3 0)"><rect width="27" height="30" rx="9" fill="url(#kfire)"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">M</text></g><g transform="translate(37 0)"><rect width="27" height="30" rx="9" fill="url(#kfire)"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">T</text></g><g transform="translate(71 0)"><rect width="27" height="30" rx="9" fill="url(#kfire)"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">W</text></g><g transform="translate(105 0)"><rect width="27" height="30" rx="9" fill="url(#kfire)"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">T</text></g><g transform="translate(139 0)"><rect width="27" height="30" rx="9" fill="url(#kfire)"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">F</text></g><g transform="translate(173 0)"><rect width="27" height="30" rx="9" fill="#e7e0ee"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#b7add0" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">S</text></g><g transform="translate(207 0)"><rect width="27" height="30" rx="9" fill="#e7e0ee"/><text x="13.5" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#b7add0" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">S</text></g>
   <g transform="translate(255 -2)"><text x="0" y="22" font-size="26" font-weight="800" fill="url(#kink)" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">5</text><text x="20" y="22" font-size="13" font-weight="700" fill="#8a7fa6" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">day streak</text></g>
 </g>
</g>
<!-- habit cards (right) -->
<g transform="translate(900 56)"><g class="fl">
 <rect width="228" height="30" rx="12" fill="#ff9fbf"/><text x="16" y="20" font-size="13" font-weight="700" fill="#fff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Workout · done</text><circle cx="210" cy="15" r="9" fill="#fff"/>
 <rect y="40" width="228" height="30" rx="12" fill="#ffc98a"/><text x="16" y="60" font-size="13" font-weight="700" fill="#7a4a12" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Reading · 80%</text>
 <rect y="80" width="228" height="30" rx="12" fill="#8fc7ea"/><text x="16" y="100" font-size="13" font-weight="700" fill="#fff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Water · 60%</text>
 <rect y="120" width="228" height="30" rx="12" fill="#78c8a8"/><text x="16" y="140" font-size="13" font-weight="700" fill="#fff" style="font-family:'SF Pro Rounded',ui-rounded,'Nunito','Segoe UI',system-ui,sans-serif;">Coffee · ok</text><circle cx="210" cy="135" r="9" fill="#fff"/>
</g></g>
</svg>