name: Klio
options:
  bundleIdPrefix: com.klio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: ru

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

targets:
  Klio:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.klio.diary
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Sources/App/Klio.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
