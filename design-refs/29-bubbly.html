<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · 29 bubbly</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.scr::-webkit-scrollbar{display:none}
.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.hi{margin-top:18px}
.hi h1{font-size:27px;color:#2b2545;letter-spacing:-.5px}
.hi p{font-size:13px;color:rgba(43,37,69,.6);margin-top:4px;font-weight:500}
/* bubbly: very rounded, floaty soft shadows */
.w{backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);background:rgba(255,255,255,.40);border:1.5px solid rgba(255,255,255,.7);border-radius:38px;box-shadow:0 16px 40px rgba(140,120,200,.22),inset 0 1px 0 rgba(255,255,255,.6);padding:18px;position:relative;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.big{grid-column:span 2;min-height:175px;border-radius:40px}
.lbl{font-size:12px;font-weight:600;color:rgba(43,37,69,.62)}
.val{font-size:23px;font-weight:700;color:#2b2545;letter-spacing:-.5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.flex-col{display:flex;flex-direction:column;height:100%;justify-content:space-between}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:4px 12px;border-radius:24px;background:rgba(255,126,179,.24);color:#a23a6b}
.bubble{border-radius:50%;display:flex;align-items:center;justify-content:center}
.tabbar{position:absolute;left:14px;right:14px;bottom:14px;height:64px;background:rgba(34,24,46,.5);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;justify-content:space-around;align-items:center;border-radius:32px;box-shadow:0 14px 34px rgba(80,60,120,.3);z-index:50}
.tab{width:22px;height:22px;border-radius:50%;opacity:.55}
.tab.on{opacity:1;background:rgba(255,160,200,.95)}
.water-fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(94,131,168,.32),rgba(94,131,168,.6))}
</style>
</head>
<body>
<div class="phone">
<div class="notch"></div>
<div class="scr">
<div class="status"><span>9:41</span><span>📶 🔋</span></div>
<div class="hi">
<h1>Добрый день</h1>
<p>Пятница · 19 июня · 2 из 5 закрыто</p>
</div>

<div class="grid">
<!-- big summary -->
<div class="w big">
<div style="display:flex;align-items:center;gap:18px;height:100%">
<div style="position:relative;flex-shrink:0">
<svg viewBox="0 0 130 130" width="120" height="120">
<circle cx="65" cy="65" r="54" fill="none" stroke="rgba(255,126,179,.18)" stroke-width="14"/>
<circle cx="65" cy="65" r="54" fill="none" stroke="url(#bgr)" stroke-width="14" stroke-linecap="round" stroke-dasharray="339" stroke-dashoffset="203" transform="rotate(-90 65 65)"/>
<defs><linearGradient id="bgr" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff9ecb"/><stop offset="1" stop-color="#a9c7ff"/></linearGradient></defs>
<text x="65" y="62" text-anchor="middle" font-size="28" font-weight="700" fill="#2b2545">40%</text>
<text x="65" y="80" text-anchor="middle" font-size="11" fill="rgba(43,37,69,.55)">2 из 5</text>
</svg>
</div>
<div>
<span class="pill">Сегодня</span>
<p style="margin-top:12px;font-size:13px;color:rgba(43,37,69,.7);font-weight:500;line-height:1.55">Осталось <b style="color:#2b2545">3 привычки</b>.<br>Вода, чтение и кофе ждут.<br>Ты молодец!</p>
</div>
</div>
</div>

<!-- streak flame bubble -->
<div class="w sq" style="border-radius:40px">
<div class="flex-col">
<div class="lbl">Серия</div>
<div style="display:flex;align-items:center;gap:8px">
<div class="bubble" style="width:62px;height:62px;background:radial-gradient(circle at 40% 30%,rgba(255,211,107,.4),rgba(255,126,179,.25))">
<svg viewBox="0 0 48 64" width="34" height="46"><defs><linearGradient id="FL29" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL29)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
</div>
<div><div class="val" style="font-size:32px">21</div><div class="lbl">дней</div></div>
</div>
</div>
</div>

<!-- water bubble -->
<div class="w sq" style="border-radius:40px">
<div class="water-fill" style="height:60%"></div>
<div class="flex-col" style="position:relative">
<div class="lbl"><span class="dot" style="background:#5e83a8"></span> Вода</div>
<div><div class="val">1.2<span style="font-size:13px;color:rgba(43,37,69,.5)"> / 2 л</span></div><div class="lbl">серия 4 дня</div></div>
</div>
</div>

<!-- quick check bubbles wide -->
<div class="w wide">
<div class="lbl" style="margin-bottom:12px">Быстрые отметки</div>
<div style="display:flex;justify-content:space-around">
<div style="text-align:center">
<div class="bubble" style="width:54px;height:54px;background:rgba(92,154,128,.2);border:1.5px solid rgba(92,154,128,.45);margin:auto"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#5c9a80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-11"/></svg></div>
<div class="lbl" style="margin-top:6px">Зарядка</div>
</div>
<div style="text-align:center">
<div class="bubble" style="width:54px;height:54px;background:rgba(154,122,160,.2);border:1.5px solid rgba(154,122,160,.45);margin:auto"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#9a7aa0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-11"/></svg></div>
<div class="lbl" style="margin-top:6px">Не курить</div>
</div>
<div style="text-align:center">
<div class="bubble" style="width:54px;height:54px;background:rgba(174,138,90,.16);border:1.5px dashed rgba(174,138,90,.5);margin:auto"></div>
<div class="lbl" style="margin-top:6px">Читать</div>
</div>
<div style="text-align:center">
<div class="bubble" style="width:54px;height:54px;background:rgba(94,131,168,.16);border:1.5px dashed rgba(94,131,168,.5);margin:auto"></div>
<div class="lbl" style="margin-top:6px">Вода</div>
</div>
</div>
</div>

<!-- coffee -->
<div class="w sq" style="border-radius:40px">
<div class="flex-col">
<div class="lbl"><span class="dot" style="background:#7e9667"></span> Кофе</div>
<div class="bubble" style="width:60px;height:60px;background:rgba(126,150,103,.18);margin:auto"><span class="val" style="font-size:22px;color:#5e7549">1</span></div>
<div class="lbl">из ≤2 · серия 3</div>
</div>
</div>

<!-- reading -->
<div class="w sq" style="border-radius:40px">
<div class="flex-col">
<div class="lbl"><span class="dot" style="background:#ae8a5a"></span> Читать</div>
<div style="position:relative;display:flex;align-items:center;justify-content:center;margin:auto">
<svg viewBox="0 0 90 90" width="84" height="84">
<circle cx="45" cy="45" r="37" fill="none" stroke="rgba(174,138,90,.18)" stroke-width="12"/>
<circle cx="45" cy="45" r="37" fill="none" stroke="#ae8a5a" stroke-width="12" stroke-linecap="round" stroke-dasharray="232" stroke-dashoffset="46" transform="rotate(-90 45 45)"/>
<text x="45" y="50" text-anchor="middle" font-size="18" font-weight="700" fill="#2b2545">80</text>
</svg>
</div>
<div class="lbl">80 / 100 стр</div>
</div>
</div>
</div>
</div>

<div class="tabbar">
<div class="tab on"></div><div class="tab"></div><div class="tab"></div><div class="tab"></div>
</div>
</div>
</body>
</html>
