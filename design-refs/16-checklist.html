<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · Чек-лист</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 110px;background:#f6f5f2;color:#1c1b19}

.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#1c1b19}
.hello{margin-top:22px}
.hello h1{font-size:27px;font-weight:700;letter-spacing:-.6px}
.hello .date{font-size:13px;color:#8d8a84;margin-top:3px;font-weight:500}
.serie{display:inline-block;margin-top:12px;background:#fff;border:1px solid #ece9e2;border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;color:#a07a2e;box-shadow:0 2px 6px rgba(0,0,0,.03)}

.section{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:#a8a49c;font-weight:700;margin:26px 4px 12px}

.row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #ece9e2;border-radius:20px;padding:16px 16px;margin-bottom:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.03);transition:transform .12s,opacity .2s}
.row:active{transform:scale(.985)}
.box{width:32px;height:32px;border-radius:50%;border:2.5px solid #d7d3ca;flex:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;transition:all .2s}
.row.done .box{border-color:transparent;color:#fff}
.body{flex:1;min-width:0}
.name{font-size:16px;font-weight:600;line-height:1.2}
.sub{font-size:12.5px;color:#9a968e;margin-top:3px;font-weight:500}
.row.done .name{color:#b3afa6;text-decoration:line-through;text-decoration-color:#cfcbc2}
.row.done .sub{color:#bfbbb2}
.streak{font-size:12px;font-weight:700;color:#c0985a;flex:none}

.dot{width:9px;height:9px;border-radius:50%;flex:none}

.summary{position:absolute;left:18px;right:18px;bottom:24px;background:#1c1b19;color:#f6f5f2;border-radius:22px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 12px 30px rgba(0,0,0,.25);z-index:40}
.summary .big{font-size:18px;font-weight:700}
.summary .small{font-size:12px;color:#a8a49c;font-weight:500;margin-top:1px}
.ring{width:46px;height:46px}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="status"><span>9:41</span><span>📶 🔋</span></div>

  <div class="hello">
    <h1>Добрый день</h1>
    <div class="date">Пятница · 19 июня</div>
    <div class="serie">🔥 Серия 21 день</div>
  </div>

  <div class="section">Сегодня</div>

  <!-- Зарядка done -->
  <div class="row done" onclick="this.classList.toggle('done')">
    <div class="box" style="background:#5c9a80">✓</div>
    <div class="body"><div class="name">Зарядка</div><div class="sub">Сделано сегодня</div></div>
    <div class="streak">🔥14</div>
  </div>

  <!-- Читать done -->
  <div class="row done" onclick="this.classList.toggle('done')">
    <div class="box" style="background:#ae8a5a">✓</div>
    <div class="body"><div class="name">Читать</div><div class="sub">80 / 100 стр</div></div>
    <div class="streak">🔥21</div>
  </div>

  <!-- Вода open -->
  <div class="row" onclick="this.classList.toggle('done');this.querySelector('.box').style.background='#5e83a8'">
    <div class="box">✓</div>
    <div class="body"><div class="name">Вода</div><div class="sub">1.2 / 2 л</div></div>
    <div class="streak">🔥4</div>
  </div>

  <!-- Не курить open -->
  <div class="row" onclick="this.classList.toggle('done');this.querySelector('.box').style.background='#9a7aa0'">
    <div class="box">✓</div>
    <div class="body"><div class="name">Не курить</div><div class="sub">Отметить воздержание</div></div>
    <div class="streak">🔥8</div>
  </div>

  <!-- Кофе open -->
  <div class="row" onclick="this.classList.toggle('done');this.querySelector('.box').style.background='#7e9667'">
    <div class="box">✓</div>
    <div class="body"><div class="name">Кофе</div><div class="sub">1 / ≤2 чаш</div></div>
    <div class="streak">🔥3</div>
  </div>

</div>

<div class="summary">
  <div>
    <div class="big">2 из 5 закрыто</div>
    <div class="small">Осталось 3 привычки</div>
  </div>
  <svg class="ring" viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="5"/>
    <circle cx="22" cy="22" r="18" fill="none" stroke="#5c9a80" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="113" stroke-dashoffset="68" transform="rotate(-90 22 22)"/>
    <text x="22" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#f6f5f2">40%</text>
  </svg>
</div>
</div>
</body>
</html>
