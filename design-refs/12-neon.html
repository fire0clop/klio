<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klio · Neon</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#e8ecf4;
  background:radial-gradient(circle at 20% 0%,#1a1430 0%,#0a0a14 55%),#07070d}
.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#9aa3c0}
.head{margin-top:20px}
.head h1{font-size:24px;font-weight:800;letter-spacing:-.3px}
.head h1 b{color:#c9b6ff;text-shadow:0 0 18px rgba(168,124,255,.7)}
.head .date{font-size:12px;color:#7780a0;margin-top:3px;font-weight:600;letter-spacing:1px}
.hero{margin-top:18px;display:flex;align-items:center;gap:18px;
  background:linear-gradient(145deg,rgba(40,30,70,.6),rgba(15,15,28,.6));
  border:1px solid rgba(150,120,255,.25);border-radius:24px;padding:18px 20px;
  box-shadow:0 0 30px rgba(120,90,220,.18),inset 0 0 30px rgba(120,90,220,.08)}
.ring{width:78px;height:78px;flex-shrink:0;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rc b{font-size:20px;font-weight:800;line-height:1;color:#fff;text-shadow:0 0 12px rgba(34,211,238,.8)}
.ring .rc span{font-size:8px;color:#8a93b5;font-weight:700;letter-spacing:1px}
.hero .info .t{font-size:14px;font-weight:700;color:#cfd6ee}
.hero .info .s{font-size:12px;color:#8189aa;margin-top:3px}
.hero .info .streak{margin-top:10px;font-size:13px;font-weight:800;color:#ffb454;
  text-shadow:0 0 14px rgba(255,180,84,.6)}
.sec{font-size:11px;letter-spacing:3px;color:#6f78a0;font-weight:800;margin:24px 0 12px;text-transform:uppercase}
.card{position:relative;background:linear-gradient(145deg,rgba(26,26,42,.85),rgba(14,14,24,.85));
  border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:14px 16px;margin-bottom:12px;
  display:flex;align-items:center;gap:14px;overflow:hidden}
.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}
.ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0}
.info2{flex:1;min-width:0}
.info2 .n{font-size:14.5px;font-weight:700}
.info2 .m{font-size:11.5px;color:#7e87a8;margin-top:2px;font-weight:600}
.pbar{height:6px;border-radius:6px;background:rgba(255,255,255,.07);margin-top:8px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:6px}
.sright{flex-shrink:0;text-align:right}
.sright b{font-size:15px;font-weight:800;display:block}
.sright span{font-size:9px;color:#6f78a0;font-weight:700;letter-spacing:.5px}
.check{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;color:#07070d}
.qbtns{display:flex;gap:7px;flex-shrink:0}
.qbtns button{font-size:11px;font-weight:800;border:none;border-radius:10px;padding:8px 12px}
.qbtns .y{background:#9a7aa0;color:#fff;box-shadow:0 0 16px rgba(154,122,160,.7)}
.qbtns .n{background:rgba(154,122,160,.16);color:#c4a8ca;border:1px solid rgba(154,122,160,.4)}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="status"><span>9:41</span><span>📶 🔋</span></div>

  <div class="head">
    <h1>Добрый <b>день</b></h1>
    <div class="date">ПЯТНИЦА · 19 ИЮНЯ</div>
  </div>

  <div class="hero">
    <div class="ring">
      <svg width="78" height="78">
        <circle cx="39" cy="39" r="32" stroke="rgba(255,255,255,.08)" stroke-width="7" fill="none"/>
        <circle cx="39" cy="39" r="32" stroke="url(#g)" stroke-width="7" fill="none"
          stroke-linecap="round" stroke-dasharray="201" stroke-dashoffset="121"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a855f7"/>
        </linearGradient></defs>
      </svg>
      <div class="rc"><b>2/5</b><span>ЦЕЛЕЙ</span></div>
    </div>
    <div class="info">
      <div class="t">Дневной прогресс</div>
      <div class="s">Осталось 3 цели до полного дня</div>
      <div class="streak">🔥 Серия 21 день</div>
    </div>
  </div>

  <div class="sec">— Привычки —</div>

  <!-- 1 Зарядка done -->
  <div class="card" style="--c:#5c9a80">
    <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#5c9a80;box-shadow:0 0 12px #5c9a80"></span>
    <div class="ic" style="background:rgba(92,154,128,.16);box-shadow:0 0 16px rgba(92,154,128,.3)">🏃</div>
    <div class="info2"><div class="n">Зарядка</div><div class="m">Выполнено сегодня</div>
      <div class="pbar"><i style="width:100%;background:linear-gradient(90deg,#5c9a80,#7fd6ad);box-shadow:0 0 10px #5c9a80"></i></div>
    </div>
    <div class="check" style="background:#5c9a80;box-shadow:0 0 16px #5c9a80">✓</div>
  </div>

  <!-- 2 Читать -->
  <div class="card">
    <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#ae8a5a;box-shadow:0 0 12px #ae8a5a"></span>
    <div class="ic" style="background:rgba(174,138,90,.16);box-shadow:0 0 16px rgba(174,138,90,.3)">📖</div>
    <div class="info2"><div class="n">Читать</div><div class="m">80 / 100 стр</div>
      <div class="pbar"><i style="width:80%;background:linear-gradient(90deg,#ae8a5a,#e0bd86);box-shadow:0 0 10px #ae8a5a"></i></div>
    </div>
    <div class="sright"><b style="color:#ae8a5a;text-shadow:0 0 12px rgba(174,138,90,.7)">21</b><span>СЕРИЯ</span></div>
  </div>

  <!-- 3 Вода -->
  <div class="card">
    <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#5e83a8;box-shadow:0 0 12px #5e83a8"></span>
    <div class="ic" style="background:rgba(94,131,168,.16);box-shadow:0 0 16px rgba(94,131,168,.3)">💧</div>
    <div class="info2"><div class="n">Вода</div><div class="m">1.2 / 2 л</div>
      <div class="pbar"><i style="width:60%;background:linear-gradient(90deg,#5e83a8,#8db8e0);box-shadow:0 0 10px #5e83a8"></i></div>
    </div>
    <div class="sright"><b style="color:#5e83a8;text-shadow:0 0 12px rgba(94,131,168,.7)">4</b><span>СЕРИЯ</span></div>
  </div>

  <!-- 4 Не курить -->
  <div class="card">
    <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#9a7aa0;box-shadow:0 0 12px #9a7aa0"></span>
    <div class="ic" style="background:rgba(154,122,160,.16);box-shadow:0 0 16px rgba(154,122,160,.3)">🚭</div>
    <div class="info2"><div class="n">Не курить</div><div class="m">Серия 8 · отметь воздержание</div></div>
    <div class="qbtns"><button class="y">Да</button><button class="n">Нет</button></div>
  </div>

  <!-- 5 Кофе -->
  <div class="card">
    <span style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#7e9667;box-shadow:0 0 12px #7e9667"></span>
    <div class="ic" style="background:rgba(126,150,103,.16);box-shadow:0 0 16px rgba(126,150,103,.3)">☕</div>
    <div class="info2"><div class="n">Кофе</div><div class="m">1 / ≤2 чаш</div>
      <div class="pbar"><i style="width:50%;background:linear-gradient(90deg,#7e9667,#a9c490);box-shadow:0 0 10px #7e9667"></i></div>
    </div>
    <div class="sright"><b style="color:#7e9667;text-shadow:0 0 12px rgba(126,150,103,.7)">3</b><span>СЕРИЯ</span></div>
  </div>
</div></div>
</body>
</html>
