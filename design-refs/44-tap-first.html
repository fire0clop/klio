<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>44 · Tap First</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#2b2545;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.h1{font-size:25px;font-weight:800;margin-top:18px}.date{font-size:13px;color:#6b6388;margin-top:3px;font-weight:500}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;position:relative;overflow:hidden;margin-top:14px}
.wt{font-size:12px;font-weight:700;color:#6b6388}.wsub{font-size:11px;color:#54506e;font-weight:600}
.taprow{display:flex;align-items:center;gap:14px;padding:14px 6px}
.taprow+.taprow{border-top:1px solid rgba(120,110,170,.14)}
.ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
.taprow b{font-size:16px;font-weight:700}
.tap{width:50px;height:50px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:24px;color:#b0a3c8;cursor:pointer;margin-left:auto;transition:.15s;user-select:none}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff;transform:scale(1.05)}
.bar{height:8px;border-radius:5px;background:rgba(120,110,170,.16);overflow:hidden;margin-top:8px;width:120px}.bar i{display:block;height:100%;border-radius:5px}
.hint{text-align:center;font-size:12px;color:#6b6388;margin-top:16px;font-weight:600}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=h1>Отметь сделанное</div><div class=date>Пятница · 19 июня · одним касанием</div>
<div class=w>
<div class=taprow><div class=ic style="background:rgba(92,154,128,.16)">🏃</div><div><b>Зарядка</b><div class=wsub>серия 14 · тапни если сделал</div></div><div class="tap done" onclick="this.classList.toggle('done')">✓</div></div>
<div class=taprow><div class=ic style="background:rgba(154,122,160,.16)">🚭</div><div><b>Не курить</b><div class=wsub>серия 8 · воздержался?</div></div><div class=tap onclick="this.classList.toggle('done')">✓</div></div>
<div class=taprow><div class=ic style="background:rgba(94,131,168,.16)">💧</div><div><b>Вода</b><div class=wsub>1.2 / 2 л</div><div class=bar><i style="width:60%;background:#5e83a8"></i></div></div><div class=tap onclick="this.classList.toggle('done')">✓</div></div>
<div class=taprow><div class=ic style="background:rgba(174,138,90,.16)">📖</div><div><b>Читать</b><div class=wsub>80 / 100 стр</div><div class=bar><i style="width:80%;background:#ae8a5a"></i></div></div><div class=tap onclick="this.classList.toggle('done')">✓</div></div>
<div class=taprow><div class=ic style="background:rgba(126,150,103,.16)">☕</div><div><b>Кофе</b><div class=wsub>1 / ≤2 чаш · в норме</div></div><div class="tap done" onclick="this.classList.toggle('done')">✓</div></div>
</div>
<div class=hint>2 из 5 закрыто · тапай кружок — он наполнится ✓</div>
</div></div></body></html>
