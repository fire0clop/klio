<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>18 · Glass</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#fff;
background:radial-gradient(120% 80% at 0% 0%,#7b5cff 0%,transparent 50%),radial-gradient(120% 80% at 100% 10%,#ff7eb3 0%,transparent 45%),radial-gradient(120% 90% at 50% 100%,#21d4fd 0%,transparent 55%),linear-gradient(160deg,#5b3fd6,#2b2170)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:18px}
.date{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.7;font-weight:700}
.h1{font-size:30px;font-weight:800;margin:2px 0 18px}
.g{backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.hero{padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.hr{width:54px;height:54px;border-radius:50%;background:conic-gradient(#fff 144deg,rgba(255,255,255,.25) 0);display:flex;align-items:center;justify-content:center}
.hr i{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-style:normal;font-weight:800;font-size:14px}
.hero b{font-size:17px}.hero p{opacity:.8;font-size:13px;margin-top:2px}
.row{padding:14px 16px;margin-bottom:11px;display:flex;align-items:center;gap:13px}
.ic{width:40px;height:40px;border-radius:13px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:18px}
.row b{font-size:15px}.row span{font-size:12px;opacity:.8;display:block;margin-top:1px}
.fl{margin-left:auto;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);padding:5px 10px;border-radius:20px}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=date>Пятница · 19 июня</div><div class=h1>Добрый день</div>
<div class="g hero"><div class=hr><i>2/5</i></div><div><b>Ты на ходу</b><p>Осталось 3 · серия 21 день</p></div></div>
<div class="g row"><div class=ic>🏃</div><div><b>Зарядка</b><span>сделано сегодня</span></div><span class=fl>🔥14</span></div>
<div class="g row"><div class=ic>📖</div><div><b>Читать</b><span>80 / 100 стр</span></div><span class=fl>🔥21</span></div>
<div class="g row"><div class=ic>💧</div><div><b>Вода</b><span>1.2 / 2 л</span></div><span class=fl>🔥4</span></div>
<div class="g row"><div class=ic>🚭</div><div><b>Не курить</b><span>отметить воздержание</span></div><span class=fl>🔥8</span></div>
<div class="g row"><div class=ic>☕</div><div><b>Кофе</b><span>1 / ≤2 чаш</span></div><span class=fl>🔥3</span></div>
</div></div></body></html>
