<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio — Streak Hero</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.scr::-webkit-scrollbar{display:none}
.bar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.greet{margin-top:14px}
.greet h1{font-size:26px;color:#2b2545;font-weight:800;letter-spacing:-.5px}
.greet p{font-size:14px;color:#6b6388;margin-top:2px;font-weight:600}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;position:relative;overflow:hidden}
.hero{margin-top:18px;padding:22px 20px;display:flex;flex-direction:column;align-items:center;text-align:center}
.hero .flame{filter:drop-shadow(0 6px 14px rgba(255,126,179,.45))}
.hero .num{font-size:54px;font-weight:900;color:#2b2545;line-height:1;letter-spacing:-2px;margin-top:6px}
.hero .lbl{font-size:15px;color:#6b6388;font-weight:700;margin-top:2px}
.days{display:flex;gap:7px;margin-top:18px}
.pill{flex:1;height:52px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:800;gap:2px}
.pill .d{font-size:10px;opacity:.8;font-weight:700}
.pill.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff;box-shadow:0 6px 14px rgba(138,123,255,.3)}
.pill.off{background:rgba(120,110,170,.15);color:#9a93b0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.tile{padding:14px;display:flex;flex-direction:column;justify-content:space-between}
.tile .t{font-size:15px;font-weight:800;color:#2b2545}
.tile .s{font-size:12px;color:#6b6388;font-weight:600}
.row{display:flex;align-items:center;justify-content:space-between}
.streak-mini{font-size:11px;font-weight:800;color:#8a7bff;background:rgba(138,123,255,.14);padding:3px 8px;border-radius:20px}
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.9}
.liquid .wfill::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.drop{position:absolute;z-index:4;width:12px;height:16px;background:var(--c1);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;top:-8px}
.tap{width:48px;height:48px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#b0a3c8;cursor:pointer;transition:.2s;flex-shrink:0}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div><div class="scr">
<div class="bar"><span>9:41</span><span>📶 🔋</span></div>
<div class="greet"><h1>Добрый день</h1><p>Пятница · 19 июня</p></div>

<div class="w hero">
<svg viewBox="0 0 48 64" width="76" height="100" class="flame"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div class="num">21</div>
<div class="lbl">дней подряд</div>
<div class="days">
<div class="pill on"><span class="d">Пн</span>✓</div>
<div class="pill on"><span class="d">Вт</span>✓</div>
<div class="pill on"><span class="d">Ср</span>✓</div>
<div class="pill on"><span class="d">Чт</span>✓</div>
<div class="pill on"><span class="d">Пт</span>✓</div>
<div class="pill off"><span class="d">Сб</span>·</div>
<div class="pill off"><span class="d">Вс</span>·</div>
</div>
</div>

<div class="grid">
<div class="w sq tile liquid" style="--lvl:80%;--c1:#c2a06b;--c2:#ae8a5a">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="t">📖 Читать</span><span class="streak-mini">21</span></div>
<div class="s">80/100 стр</div>
</div>
</div>
<div class="w sq tile liquid" style="--lvl:60%;--c1:#7fb0e0;--c2:#5e83a8">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="t">💧 Вода</span><span class="streak-mini">4</span></div>
<div class="s">1.2/2 л</div>
</div>
</div>
<div class="w wide tile" style="flex-direction:row;align-items:center;justify-content:space-between">
<div><div class="t">🏃 Зарядка</div><div class="s">Отметь выполнение · серия 14</div></div>
<div class="tap" onclick="this.classList.toggle('done')">✓</div>
</div>
<div class="w sq tile" style="justify-content:space-between">
<div class="row"><span class="t">🚭 Не курить</span><span class="streak-mini">8</span></div>
<div class="tap" onclick="this.classList.toggle('done')">✓</div>
</div>
<div class="w sq tile liquid" style="--lvl:50%;--c1:#9bb27e;--c2:#7e9667">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="t">☕ Кофе</span><span class="streak-mini">3</span></div>
<div class="s">1 / ≤2 чашки</div>
</div>
</div>
</div>
</div></div>
</body>
</html>
