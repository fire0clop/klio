<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · Gradient Border</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sbar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.hello{margin-top:18px}
.hello h1{font-size:26px;font-weight:800;color:#2b2545;letter-spacing:-.5px}
.hello p{font-size:13px;color:rgba(43,37,69,.6);margin-top:4px;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
/* gradient-border via double-background trick */
.w{border-radius:26px;padding:1.6px;
background:linear-gradient(140deg,#ff9ecb,#a9c7ff 55%,#c9a8ff);
box-shadow:0 10px 30px rgba(120,90,170,.18)}
.w-in{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.46);border-radius:24.4px;padding:16px;height:100%;position:relative;overflow:hidden}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.big{grid-column:span 2}
.big .w-in{min-height:170px}
.center{height:100%;display:flex;flex-direction:column;justify-content:space-between}
.lbl{font-size:12px;font-weight:700;color:rgba(43,37,69,.6)}
.val{font-size:15px;font-weight:800;color:#2b2545;margin-top:2px}
.tag{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.streak-num{font-size:36px;font-weight:900;color:#2b2545;line-height:1}
.bar{height:8px;border-radius:6px;background:rgba(43,37,69,.12);margin-top:10px;overflow:hidden}
.fill{height:100%;border-radius:6px}
.cups{display:flex;gap:5px;margin-top:10px}
.cup{flex:1;height:30px;border-radius:8px;border:1.5px solid rgba(94,131,168,.5)}
.cup.full{background:linear-gradient(180deg,#7fb0e0,#5e83a8);border-color:transparent}
.spark{display:flex;align-items:flex-end;gap:5px;height:54px;margin-top:8px}
.spk{flex:1;border-radius:5px 5px 0 0;background:linear-gradient(180deg,#ff9ecb,#a9c7ff)}
.chk{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.tabbar{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(20,18,30,.82);backdrop-filter:blur(20px);display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,255,255,.08);z-index:50}
.tb{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5)}
.tb.act{background:linear-gradient(135deg,#ff9ecb,#a9c7ff);color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="sbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="hello">
    <h1>Добрый день</h1>
    <p>Пятница · 19 июня · 2 из 5 закрыто</p>
  </div>

  <div class="grid">
    <!-- Big ring -->
    <div class="w big"><div class="w-in"><div class="center">
      <div class="lbl">Прогресс дня</div>
      <svg viewBox="0 0 120 120" width="120" height="120" style="display:block;margin:0 auto">
        <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(43,37,69,.12)" stroke-width="12"/>
        <defs><linearGradient id="rg35" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs>
        <circle cx="60" cy="60" r="50" fill="none" stroke="url(#rg35)" stroke-width="12" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="188" transform="rotate(-90 60 60)"/>
        <text x="60" y="56" text-anchor="middle" font-size="30" font-weight="900" fill="#2b2545">40%</text>
        <text x="60" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="rgba(43,37,69,.55)">2 / 5</text>
      </svg>
      <div class="val">Так держать</div>
    </div></div></div>

    <!-- Streak flame -->
    <div class="w sq"><div class="w-in"><div class="center">
      <svg viewBox="0 0 48 64" width="32" height="42"><defs><linearGradient id="FL35" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL35)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
      <div class="streak-num">21</div>
      <div class="lbl">дней подряд</div>
    </div></div></div>

    <!-- Вода -->
    <div class="w sq"><div class="w-in"><div class="center">
      <div class="tag" style="background:#5e83a8">💧</div>
      <div><div class="val">1.2 / 2 л</div><div class="lbl">Вода · серия 4</div></div>
      <div class="cups"><div class="cup full"></div><div class="cup full"></div><div class="cup full"></div><div class="cup"></div></div>
    </div></div></div>

    <!-- Week chart -->
    <div class="w wide"><div class="w-in">
      <div class="lbl">Неделя</div>
      <div class="spark">
        <div class="spk" style="height:40%"></div><div class="spk" style="height:70%"></div><div class="spk" style="height:55%"></div><div class="spk" style="height:90%"></div><div class="spk" style="height:80%"></div><div class="spk" style="height:30%"></div><div class="spk" style="height:60%"></div>
      </div>
    </div></div>

    <!-- Зарядка -->
    <div class="w sq"><div class="w-in"><div class="center">
      <div class="tag" style="background:#5c9a80">🏃</div>
      <div><div class="val">Готово</div><div class="lbl">Зарядка · 14</div></div>
      <div class="chk" style="background:#5c9a80"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div></div></div>

    <!-- Кофе -->
    <div class="w sq"><div class="w-in"><div class="center">
      <div class="tag" style="background:#7e9667">☕</div>
      <div><div class="val">1 / ≤2</div><div class="lbl">Кофе · серия 3</div></div>
      <div class="bar"><div class="fill" style="width:50%;background:linear-gradient(90deg,#9bb47e,#7e9667)"></div></div>
    </div></div></div>

    <!-- Читать -->
    <div class="w wide"><div class="w-in">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="tag" style="background:#ae8a5a">📖</div>
        <div style="flex:1"><div class="val">Читать · 80 / 100 стр</div><div class="lbl">серия 21</div></div>
        <div class="val">80%</div>
      </div>
      <div class="bar"><div class="fill" style="width:80%;background:linear-gradient(90deg,#caa06a,#ae8a5a)"></div></div>
    </div></div>

    <!-- Не курить -->
    <div class="w wide"><div class="w-in">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="tag" style="background:#9a7aa0">🚭</div>
        <div style="flex:1"><div class="val">Не курить</div><div class="lbl">серия 8 дней</div></div>
        <div class="chk" style="background:#9a7aa0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
    </div></div>
  </div>
</div>
<div class="tabbar">
  <div class="tb act"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6h-6v6H5a2 2 0 01-2-2z"/></svg></div>
  <div class="tb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></div>
  <div class="tb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9M10 19V5M16 19v-7M20 19h-1"/></svg></div>
  <div class="tb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></div>
</div>
</div>
</body>
</html>
