<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klio · Dial</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;background:radial-gradient(110% 70% at 50% 18%,#1b1d24 0%,#101117 60%,#0c0d11 100%);color:#e9ecf2}

.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#cdd2dc}
.head{margin-top:20px;text-align:center}
.head .date{font-size:12px;color:#7d8596;font-weight:600;letter-spacing:.3px}
.head h1{font-size:22px;font-weight:700;margin-top:4px}
.head .sum{font-size:12px;color:#828b9d;margin-top:5px}

.dialwrap{display:flex;justify-content:center;margin-top:18px}
.dial{position:relative;width:248px;height:248px}
.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.center .pct{font-size:46px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.center .lbl{font-size:12px;color:#828b9d;font-weight:600;margin-top:4px}
.center .closed{font-size:11px;color:#5d6577;margin-top:8px;background:#191c24;border:1px solid #262a34;padding:5px 12px;border-radius:20px}

.legend{margin-top:24px;display:flex;flex-direction:column;gap:10px}
.lrow{display:flex;align-items:center;gap:12px;background:#171a21;border:1px solid #23262f;border-radius:16px;padding:11px 14px}
.lrow .ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.lrow .nm{font-size:14px;font-weight:650;flex:1}
.lrow .val{font-size:12px;color:#828b9d;font-weight:500}
.lrow .pc{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
.dotc{width:9px;height:9px;border-radius:50%}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div><div class="scr">
  <div class="status"><span>9:41</span><span>📶 🔋</span></div>
  <div class="head">
    <div class="date">Пятница · 19 июня</div>
    <h1>Добрый день</h1>
    <div class="sum">🔥 общая серия 21 день</div>
  </div>

  <div class="dialwrap">
    <div class="dial">
      <svg width="248" height="248" viewBox="0 0 248 248" id="svg"></svg>
      <div class="center">
        <div class="pct">40%</div>
        <div class="lbl">дня выполнено</div>
        <div class="closed">2 из 5 целей</div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="lrow"><div class="ic" style="background:rgba(92,154,128,.16)">🏃</div><div class="nm">Зарядка</div><div class="val">выполнено</div><span class="dotc" style="background:#5c9a80"></span><div class="pc" style="color:#5c9a80">100%</div></div>
    <div class="lrow"><div class="ic" style="background:rgba(174,138,90,.16)">📖</div><div class="nm">Читать</div><div class="val">80/100 стр</div><span class="dotc" style="background:#ae8a5a"></span><div class="pc" style="color:#ae8a5a">80%</div></div>
    <div class="lrow"><div class="ic" style="background:rgba(94,131,168,.16)">💧</div><div class="nm">Вода</div><div class="val">1.2/2 л</div><span class="dotc" style="background:#5e83a8"></span><div class="pc" style="color:#5e83a8">60%</div></div>
    <div class="lrow"><div class="ic" style="background:rgba(154,122,160,.16)">🚭</div><div class="nm">Не курить</div><div class="val">не отмечено</div><span class="dotc" style="background:#9a7aa0"></span><div class="pc" style="color:#9a7aa0">0%</div></div>
    <div class="lrow"><div class="ic" style="background:rgba(126,150,103,.16)">☕</div><div class="nm">Кофе</div><div class="val">1/≤2 чаш</div><span class="dotc" style="background:#7e9667"></span><div class="pc" style="color:#7e9667">50%</div></div>
  </div>
</div></div>

<script>
const C=124, R=98, W=15, GAP=8; // center, radius, stroke width, gap deg
const segs=[
  {c:'#5c9a80',p:100},
  {c:'#ae8a5a',p:80},
  {c:'#5e83a8',p:60},
  {c:'#9a7aa0',p:0},
  {c:'#7e9667',p:50}
];
const ns='http://www.w3.org/2000/svg';
const svg=document.getElementById('svg');
const total=360, seg=total/segs.length;
function pol(a){const r=(a-90)*Math.PI/180;return [C+R*Math.cos(r),C+R*Math.sin(r)];}
function arc(a0,a1,color,opacity){
  const large=(a1-a0)>180?1:0;
  const [x0,y0]=pol(a0),[x1,y1]=pol(a1);
  const p=document.createElementNS(ns,'path');
  p.setAttribute('d',`M${x0} ${y0} A${R} ${R} 0 ${large} 1 ${x1} ${y1}`);
  p.setAttribute('stroke',color);p.setAttribute('stroke-width',W);
  p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');
  p.setAttribute('opacity',opacity);
  svg.appendChild(p);
}
segs.forEach((s,i)=>{
  const start=i*seg+GAP/2, end=(i+1)*seg-GAP/2;
  // track
  arc(start,end,'#22252e',1);
  // fill
  if(s.p>0){
    const fillEnd=start+(end-start)*s.p/100;
    arc(start,fillEnd,s.c,1);
  }
});
</script>
</body>
</html>
