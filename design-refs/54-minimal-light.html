<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · Minimal Light</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 20px 90px;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sbar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.greet{margin-top:26px}
.greet h1{font-size:28px;color:#2b2545;font-weight:800;letter-spacing:-.6px}
.greet p{font-size:14px;color:#6b6388;margin-top:4px}
/* thin minimal widgets, lots of air */
.w{background:rgba(255,255,255,.32);border:1px solid rgba(255,255,255,.55);border-radius:30px;box-shadow:0 10px 26px rgba(120,90,160,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:20px;position:relative;overflow:hidden}
.pill{display:inline-block;background:rgba(255,126,179,.18);color:#c2477f;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
/* hero summary */
.hero{margin-top:28px;display:flex;align-items:center;gap:18px}
.ringwrap{position:relative;flex-shrink:0}
.ringtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringtxt b{font-size:24px;color:#2b2545;font-weight:800}
.ringtxt span{font-size:10px;color:#6b6388}
.hero .msg{font-size:13px;color:#6b6388;margin-top:10px;line-height:1.5}
/* single flame row */
.flamebar{margin-top:24px;display:flex;align-items:center;gap:16px}
.flamebar .num{font-size:30px;font-weight:800;color:#2b2545;line-height:1}
.flamebar .lbl{font-size:12px;color:#6b6388}
.days{display:flex;gap:7px;margin-left:auto}
.day{width:28px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.day.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff}
.day.off{background:rgba(120,110,170,.15);color:#9a93b0}
/* big water liquid */
.bigwater{margin-top:24px;min-height:150px}
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.9}
.liquid .wfill::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%}
.bigwater .content{display:flex;flex-direction:column;justify-content:space-between;min-height:110px}
.bigwater .top{display:flex;justify-content:space-between;align-items:flex-start}
.bigwater .ic{font-size:30px}
.bigwater .name{font-size:20px;font-weight:800;color:#173b52}
.bigwater .meta{font-size:14px;color:#173b52;opacity:.8;margin-top:2px}
/* big tap */
.bigtap{margin-top:24px;display:flex;align-items:center;gap:18px;cursor:pointer}
.bigtap .ic{font-size:30px}
.bigtap .name{font-size:19px;font-weight:800;color:#2b2545}
.bigtap .meta{font-size:13px;color:#6b6388;margin-top:2px}
.tap{width:60px;height:60px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:26px;color:#b0a3c8;cursor:pointer;margin-left:auto;transition:.25s}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="sbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="greet"><h1>Добрый день</h1><p>Пятница · 19 июня</p></div>

  <div class="w hero">
    <div class="ringwrap">
      <svg width=110 height=110 viewBox="0 0 110 110"><circle cx=55 cy=55 r=46 fill=none stroke="rgba(120,110,170,.18)" stroke-width=10/><circle cx=55 cy=55 r=46 fill=none stroke="url(#R)" stroke-width=10 stroke-linecap=round stroke-dasharray=289 stroke-dashoffset=173 transform="rotate(-90 55 55)"/><defs><linearGradient id=R x1=0 y1=0 x2=1 y2=1><stop offset=0 stop-color=#ff7eb3/><stop offset=1 stop-color=#8a7bff/></linearGradient></defs></svg>
      <div class="ringtxt"><b>40%</b><span>2 из 5</span></div>
    </div>
    <div>
      <span class="pill">Сегодня</span>
      <div class="msg">Осталось 3 привычки. Вода, чтение и кофе ждут. Ты молодец!</div>
    </div>
  </div>

  <div class="w flamebar">
    <svg viewBox="0 0 48 64" width="34" height="46"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
    <div><div class="num">21</div><div class="lbl">дней подряд</div></div>
    <div class="days">
      <div class="day on">Пн</div><div class="day on">Вт</div><div class="day on">Ср</div><div class="day on">Чт</div><div class="day on">Пт</div><div class="day off">Сб</div><div class="day off">Вс</div>
    </div>
  </div>

  <div class="w bigwater liquid" style="--lvl:60%;--c1:#7fb0e0;--c2:#5e83a8">
    <div class="wfill"></div>
    <div class="content">
      <div class="top">
        <div>
          <div class="ic">💧</div>
          <div class="name">Вода</div>
          <div class="meta">1.2 из 2 л · серия 4</div>
        </div>
        <span class="pill" style="background:rgba(255,255,255,.6);color:#173b52">60%</span>
      </div>
      <div class="meta">+ 250 мл</div>
    </div>
  </div>

  <div class="w bigtap" data-tap>
    <div class="ic">🏃</div>
    <div>
      <div class="name">Зарядка</div>
      <div class="meta">Отметь, когда сделаешь · серия 14</div>
    </div>
    <div class="tap">○</div>
  </div>
</div>
</div>
<script>
document.querySelectorAll('[data-tap]').forEach(c=>{
  c.addEventListener('click',()=>{
    const t=c.querySelector('.tap');
    t.classList.toggle('done');
    t.textContent=t.classList.contains('done')?'✓':'○';
  });
});
</script>
</body>
</html>
