<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klio · Bento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 16px 90px;background:#f3f1ec;color:#26241f}

.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#3a382f}
.head{margin-top:18px;display:flex;align-items:flex-end;justify-content:space-between}
.head h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
.head .date{font-size:12px;color:#8c887c;margin-top:2px;font-weight:600}
.av{width:42px;height:42px;border-radius:50%;background:#e2ddd0;display:flex;align-items:center;justify-content:center;font-size:19px}

.grid{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:minmax(72px,auto);gap:11px;margin-top:18px}
.tile{border-radius:22px;padding:15px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.t-sum{grid-column:span 2;background:#26241f;color:#f3f1ec;flex-direction:row;align-items:center;justify-content:space-between;padding:18px 20px}
.t-sum .big{font-size:34px;font-weight:800;letter-spacing:-1px}
.t-sum .lbl{font-size:12px;color:#a8a496;margin-top:2px;font-weight:600}
.t-sum .fire{text-align:right}
.t-sum .fire .v{font-size:26px;font-weight:800}
.t-sum .fire .l{font-size:11px;color:#a8a496;font-weight:600}

.r2{grid-row:span 2}
.ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,.55)}
.nm{font-size:14px;font-weight:700;margin-top:auto}
.val{font-size:13px;font-weight:600;opacity:.7;margin-top:1px}
.streak{font-size:10px;font-weight:700;opacity:.55;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}

.bar{height:7px;border-radius:4px;background:rgba(0,0,0,.08);margin-top:10px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px}

.ring{position:absolute;top:14px;right:14px;width:54px;height:54px}
.ring svg{transform:rotate(-90deg)}
.ring .p{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}

.donebadge{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:#5c9a80;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.toggle{margin-top:10px;display:flex;gap:6px}
.toggle button{flex:1;border:none;border-radius:11px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer}
.yes{background:#9a7aa0;color:#fff}
.no{background:rgba(255,255,255,.5);color:#6d5a72}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div><div class="scr">
  <div class="status"><span>9:41</span><span>📶 🔋</span></div>
  <div class="head">
    <div><h1>Добрый день</h1><div class="date">Пятница · 19 июня</div></div>
    <div class="av">🙂</div>
  </div>

  <div class="grid">
    <div class="tile t-sum">
      <div><div class="big">2 / 5</div><div class="lbl">целей закрыто сегодня</div></div>
      <div class="fire"><div class="v">🔥 21</div><div class="l">дней серии</div></div>
    </div>

    <!-- 2x2 крупная: Читать -->
    <div class="tile r2" style="background:#f0e4cc">
      <div class="ic" style="color:#ae8a5a">📖</div>
      <div class="ring">
        <svg width="54" height="54"><circle cx="27" cy="27" r="22" stroke="rgba(174,138,90,.25)" stroke-width="6" fill="none"/>
        <circle cx="27" cy="27" r="22" stroke="#ae8a5a" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="28"/></svg>
        <div class="p" style="color:#8a6d44">80%</div>
      </div>
      <div class="nm" style="color:#5e4d31">Читать</div>
      <div class="val" style="color:#8a6d44">80 / 100 стр</div>
      <div class="streak" style="color:#8a6d44">🔥 серия 21</div>
    </div>

    <!-- 1x1: Зарядка done -->
    <div class="tile" style="background:#dce9e1">
      <div class="ic" style="color:#5c9a80">🏃</div>
      <div class="donebadge">✓</div>
      <div class="nm" style="color:#3d6354">Зарядка</div>
      <div class="val" style="color:#5c9a80">Выполнено</div>
    </div>

    <!-- 1x1: Кофе лимит -->
    <div class="tile" style="background:#e3ead4">
      <div class="ic" style="color:#7e9667">☕</div>
      <div class="nm" style="color:#566840">Кофе</div>
      <div class="val" style="color:#7e9667">1 / ≤2 чаш</div>
      <div class="bar"><i style="width:50%;background:#7e9667"></i></div>
    </div>

    <!-- 1x2 широкая: Вода -->
    <div class="tile" style="background:#d8e3ee;grid-column:span 2;flex-direction:row;align-items:center;gap:14px">
      <div class="ic" style="color:#5e83a8">💧</div>
      <div style="flex:1">
        <div class="nm" style="color:#3e5a78;margin-top:0">Вода</div>
        <div class="val" style="color:#5e83a8">1.2 / 2 л · серия 4</div>
        <div class="bar"><i style="width:60%;background:#5e83a8"></i></div>
      </div>
      <div style="font-size:24px;font-weight:800;color:#5e83a8">60%</div>
    </div>

    <!-- 1x2 широкая: Не курить toggle -->
    <div class="tile" style="background:#e7ddea;grid-column:span 2;flex-direction:row;align-items:center;gap:14px">
      <div class="ic" style="color:#9a7aa0">🚭</div>
      <div style="flex:1">
        <div class="nm" style="color:#6d5a72;margin-top:0">Не курить</div>
        <div class="val" style="color:#9a7aa0">Воздержание · серия 8</div>
      </div>
      <div class="toggle" style="flex:0 0 120px"><button class="yes">Да</button><button class="no">Нет</button></div>
    </div>
  </div>
</div></div>
</body>
</html>
