<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · calm-soft</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
/* softened, desaturated pastel */
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#46415e;
background:radial-gradient(120% 80% at 0% 0%,#f3dfe9 0,transparent 52%),radial-gradient(120% 80% at 100% 6%,#dde6f0 0,transparent 52%),radial-gradient(100% 90% at 50% 100%,#e6e0f0 0,transparent 55%),linear-gradient(160deg,#f5edf2,#e8eef5)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.muted{color:#928aa6}
.w{backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);border-radius:30px;box-shadow:0 10px 26px rgba(120,90,160,.1);padding:18px;position:relative;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.head{margin-top:22px}
.head .greet{font-size:13px;color:#928aa6;font-weight:500}
.head h1{font-size:25px;font-weight:700;letter-spacing:-.4px;margin-top:3px}
.head .date{font-size:12px;color:#928aa6;margin-top:4px;font-weight:500}
/* streak — thin, airy */
.streak{margin-top:18px;display:flex;align-items:center;gap:16px}
.streaknum{font-size:28px;font-weight:700;line-height:1;color:#9d8bb8}
.streaklbl{font-size:11px;color:#928aa6;font-weight:500;margin-top:2px}
.days{display:flex;gap:7px;margin-left:auto}
.day{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.day.on{background:linear-gradient(135deg,#e7a9c6,#a89ed1);color:#fff}
.day.off{background:rgba(150,140,180,.12);color:#a8a0bc}
.sectitle{font-size:13px;font-weight:700;margin:26px 4px 0;letter-spacing:.2px;color:#7a7294;text-transform:uppercase}
/* liquid muted */
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.7}
.liquid .wfill::before{content:"";position:absolute;top:-8px;left:0;right:0;height:16px;background:var(--c1);border-radius:45%;opacity:.7}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.htitle{font-size:14px;font-weight:600}
.hsub{font-size:12px;color:#6e6688;font-weight:500}
.streakmini{font-size:11px;color:#928aa6;font-weight:500}
.tap{width:46px;height:46px;border-radius:50%;border:1.5px solid #d7cee4;display:flex;align-items:center;justify-content:center;font-size:20px;color:#bcb2cf;cursor:pointer;transition:.3s;background:rgba(255,255,255,.4)}
.tap.done{background:linear-gradient(135deg,#8fb6a0,#86ad9b);border-color:transparent;color:#fff}
.row{display:flex;align-items:center;justify-content:space-between}
.over{position:absolute;top:8px;right:12px;font-size:16px;z-index:4;opacity:.5}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
<div class="sb"><span>9:41</span><span>📶 🔋</span></div>

<div class="head">
<div class="greet">Добрый день</div>
<h1>Klio</h1>
<div class="date">Пятница · 19 июня</div>
</div>

<div class="w streak">
<svg viewBox="0 0 48 64" width="30" height="40" style="opacity:.85"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0d29a"/><stop offset=".45" stop-color="#e7a9c6"/><stop offset="1" stop-color="#a89ed1"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div><div class="streaknum">21</div><div class="streaklbl">дней подряд</div></div>
<div class="days">
<div class="day on">П</div><div class="day on">В</div><div class="day on">С</div><div class="day on">Ч</div><div class="day on">П</div><div class="day off">С</div><div class="day off">В</div>
</div>
</div>

<div class="sectitle">Сегодня</div>

<div class="grid">

<div class="w sq liquid" style="--lvl:80%;--c1:#cdb88f;--c2:#b6a684">
<div class="wfill"></div>
<div class="content"><div class="htitle">📖 Читать</div><div><div class="hsub">80 / 100 стр.</div><div class="streakmini">21 день</div></div></div>
</div>

<div class="w sq liquid" style="--lvl:60%;--c1:#9fc0dc;--c2:#8aa7c2">
<div class="wfill"></div>
<div class="content"><div class="htitle">💧 Вода</div><div><div class="hsub">1.2 / 2 л</div><div class="streakmini">4 дня</div></div></div>
</div>

<div class="w sq">
<div class="content" style="height:100%;display:flex;flex-direction:column;justify-content:space-between">
<div class="htitle">🏃 Зарядка</div>
<div class="row"><span class="streakmini">14</span><div class="tap" onclick="this.classList.toggle('done')">✓</div></div>
</div>
</div>

<div class="w sq">
<div class="content" style="height:100%;display:flex;flex-direction:column;justify-content:space-between">
<div class="htitle">🚭 Не курить</div>
<div class="row"><span class="streakmini">8</span><div class="tap done" onclick="this.classList.toggle('done')">✓</div></div>
</div>
</div>

<div class="w wide liquid" style="--lvl:50%;--c1:#b3c2a0;--c2:#9eae8b;aspect-ratio:auto;min-height:84px">
<div class="wfill"></div>
<div class="content row" style="height:100%;align-items:center">
<div><div class="htitle">☕ Кофе</div><div class="hsub">1 / ≤ 2 чашки · 3 дня</div></div>
<div class="tap" onclick="this.classList.toggle('done')">+</div>
</div>
</div>

</div>

<div class="sectitle">Спокойного дня</div>
<div class="w" style="margin-top:14px;text-align:center">
<div class="hsub" style="line-height:1.5">Осталось 3 привычки.<br>Без спешки — ты молодец.</div>
</div>

</div></div>
</body>
</html>
