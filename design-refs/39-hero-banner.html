<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>39 · Hero Banner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#2b2545;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:16px}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.34);border:1px solid rgba(255,255,255,.55);border-radius:26px;box-shadow:0 10px 30px rgba(90,90,160,.16);padding:16px;position:relative;overflow:hidden}
.banner{padding:20px;display:flex;align-items:center;gap:16px;border-radius:30px;margin-bottom:14px;
background:linear-gradient(135deg,rgba(255,160,210,.5),rgba(160,190,255,.5));border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 14px 34px rgba(150,110,180,.22)}
.banner h1{font-size:21px;font-weight:800}.banner p{font-size:13px;opacity:.7;margin-top:3px;font-weight:500}
.bser{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sq{aspect-ratio:1/1}.wide{grid-column:span 2}
.wt{font-size:12px;font-weight:700;opacity:.7;display:flex;align-items:center;gap:6px}
.wbig{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}.wsub{font-size:11px;opacity:.65;font-weight:600}
.col{display:flex;flex-direction:column;justify-content:space-between;height:100%}
.bar{height:8px;border-radius:5px;background:rgba(120,110,170,.18);overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:5px}
.chk{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=banner>
<svg viewBox="0 0 48 64" width=62 height=83><defs><linearGradient id=FL x1=0 y1=0 x2=0 y2=1><stop offset=0 stop-color=#ffd36b/><stop offset=.45 stop-color=#ff7eb3/><stop offset=1 stop-color=#8a7bff/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill=#fff opacity=.55/></svg>
<div><h1>Добрый день</h1><p>Пятница · 19 июня · 2 из 5 закрыто</p><div class=bser>серия 21 день</div></div></div>
<div class=grid>
<div class="w sq col"><div class=wt>🏃 Зарядка</div><div><div class=chk style="background:#5c9a80">✓</div><div class=wsub style="margin-top:8px">сделано · 14</div></div></div>
<div class="w sq col"><div class=wt>💧 Вода</div><div><div class=wbig>1.2<span style="font-size:13px;opacity:.6">/2 л</span></div><div class=bar><i style="width:60%;background:#5e83a8"></i></div><div class=wsub style="margin-top:6px">серия 4</div></div></div>
<div class="w sq col"><div class=wt>📖 Читать</div><div><div class=wbig>80<span style="font-size:13px;opacity:.6">/100</span></div><div class=bar><i style="width:80%;background:#ae8a5a"></i></div><div class=wsub style="margin-top:6px">серия 21</div></div></div>
<div class="w sq col"><div class=wt>☕ Кофе</div><div><div class=wbig>1<span style="font-size:13px;opacity:.6">/≤2</span></div><div class=wsub style="margin-top:4px">в норме · 3</div></div></div>
<div class="w wide" style="display:flex;align-items:center;justify-content:space-between"><div><div class=wt>🚭 Не курить</div><div style="font-size:15px;font-weight:700;margin-top:6px">Воздержался сегодня?</div><div class=wsub style="margin-top:2px">серия 8 дней</div></div>
<div style="display:flex;gap:8px"><div class=chk style="background:rgba(120,110,170,.15);color:#9a7aa0">✕</div><div class=chk style="background:#9a7aa0">✓</div></div></div>
</div></div></div></body></html>
