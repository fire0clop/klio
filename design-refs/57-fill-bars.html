<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · fill-bars</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#2b2545;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.muted{color:#6b6388}
.head{margin-top:18px}
.head .greet{font-size:13px;color:#6b6388;font-weight:600}
.head h1{font-size:26px;font-weight:800;letter-spacing:-.6px;margin-top:2px}
.head .date{font-size:12px;color:#6b6388;margin-top:3px}
/* streak card */
.streak{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;margin-top:16px;display:flex;align-items:center;gap:14px}
.streaknum{font-size:30px;font-weight:800;line-height:1}
.streaklbl{font-size:11px;color:#6b6388;font-weight:600}
.days{display:flex;gap:5px;margin-left:auto}
.day{width:24px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.day.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff}
.day.off{background:rgba(120,110,170,.15);color:#9a93b0}
.sectitle{font-size:14px;font-weight:800;margin:22px 4px 12px;letter-spacing:-.2px}
/* fill bars */
.bar{position:relative;border-radius:22px;overflow:hidden;height:74px;margin-bottom:12px;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 10px 26px rgba(120,90,160,.14)}
.bfill{position:absolute;top:0;bottom:0;left:0;width:var(--p,50%);background:linear-gradient(90deg,var(--c1),var(--c2));opacity:.85}
.bfill::after{content:"";position:absolute;right:-6px;top:0;bottom:0;width:14px;background:var(--c2);border-radius:48%;opacity:.85}
.bcontent{position:relative;z-index:3;height:100%;display:flex;align-items:center;gap:13px;padding:0 16px}
.bicon{font-size:24px;width:34px;text-align:center}
.btext{flex:1}
.btitle{font-size:15px;font-weight:700}
.bsub{font-size:12px;color:#4b4368}
.bsub.light{color:rgba(255,255,255,.92)}
.btitle.light{color:#fff}
.over{position:absolute;right:-4px;top:50%;transform:translateY(-50%);font-size:20px;z-index:4;animation:drip 2.2s infinite}
@keyframes drip{0%,100%{transform:translate(0,-50%) rotate(0)}50%{transform:translate(4px,-40%) rotate(8deg)}}
.tap{width:46px;height:46px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:21px;color:#b0a3c8;cursor:pointer;flex-shrink:0;transition:.25s;background:rgba(255,255,255,.5)}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
.overflag{font-size:11px;font-weight:700;color:#fff;background:rgba(255,255,255,.28);padding:2px 7px;border-radius:8px}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
<div class="sb"><span>9:41</span><span>📶 🔋</span></div>

<div class="head">
<div class="greet">Добрый день</div>
<h1>Klio</h1>
<div class="date">Пятница · 19 июня</div>
</div>

<div class="streak">
<svg viewBox="0 0 48 64" width="34" height="46"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div><div class="streaknum">21</div><div class="streaklbl">дней подряд</div></div>
<div class="days">
<div class="day on">Пн</div><div class="day on">Вт</div><div class="day on">Ср</div><div class="day on">Чт</div><div class="day on">Пт</div><div class="day off">Сб</div><div class="day off">Вс</div>
</div>
</div>

<div class="sectitle">Привычки сегодня</div>

<!-- Зарядка (tap) -->
<div class="bar" style="--p:0%;--c1:#6cb595;--c2:#4f9e86">
<div class="bfill"></div>
<div class="bcontent">
<div class="bicon">🏃</div>
<div class="btext"><div class="btitle">Зарядка</div><div class="bsub">Отметь выполнение · 🔥 14</div></div>
<div class="tap" onclick="fb(this)">✓</div>
</div>
</div>

<!-- Читать 80% -->
<div class="bar" style="--p:80%;--c1:#d3b06f;--c2:#ae8a5a">
<div class="bfill"></div>
<div class="bcontent">
<div class="bicon">📖</div>
<div class="btext"><div class="btitle light">Читать</div><div class="bsub light">80 / 100 стр. · 🔥 21</div></div>
<div class="overflag">80%</div>
</div>
</div>

<!-- Вода 60% -->
<div class="bar" style="--p:60%;--c1:#7fb0e0;--c2:#5e83a8">
<div class="bfill"></div>
<div class="bcontent">
<div class="bicon">💧</div>
<div class="btext"><div class="btitle">Вода</div><div class="bsub light">1.2 / 2 л · 🔥 4</div></div>
<div class="overflag">60%</div>
</div>
</div>

<!-- Не курить (tap done) -->
<div class="bar" style="--p:100%;--c1:#b094b6;--c2:#9a7aa0">
<div class="bfill"></div>
<div class="bcontent">
<div class="bicon">🚭</div>
<div class="btext"><div class="btitle light">Не курить</div><div class="bsub light">Сегодня чисто · 🔥 8</div></div>
<div class="tap done" onclick="fb(this)">✓</div>
</div>
</div>

<!-- Кофе перебор -->
<div class="bar" style="--p:100%;--c1:#9bb37e;--c2:#7e9667">
<div class="bfill"></div>
<div class="over">☕</div>
<div class="bcontent">
<div class="bicon">☕</div>
<div class="btext"><div class="btitle light">Кофе</div><div class="bsub light">1 / ≤ 2 чашки · 🔥 3</div></div>
<div class="overflag">+1</div>
</div>
</div>

</div></div>
<script>function fb(e){e.classList.toggle('done');var b=e.closest('.bar').querySelector('.bfill');b.style.width=e.classList.contains('done')?'100%':'0%';}</script>
</body>
</html>
