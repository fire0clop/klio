<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · Minimal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 22px 90px;
background:radial-gradient(120% 80% at 0% 0%,#ffcfe6 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#c6d8ff 0,transparent 50%),linear-gradient(160deg,#fdeef5,#eef3ff)}
.sbar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.hello{margin-top:34px}
.hello .day{font-size:12px;font-weight:700;color:rgba(43,37,69,.45);letter-spacing:1px;text-transform:uppercase}
.hello h1{font-size:34px;font-weight:800;color:#2b2545;letter-spacing:-1px;margin-top:8px;line-height:1.05}
.hello p{font-size:14px;color:rgba(43,37,69,.5);margin-top:8px;font-weight:500}
.w{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.5);border-radius:30px;box-shadow:0 8px 26px rgba(90,90,160,.1);padding:24px;position:relative;overflow:hidden}
/* Hero streak */
.hero{margin-top:30px;display:flex;align-items:center;gap:20px}
.hero .num{font-size:60px;font-weight:900;color:#2b2545;line-height:.9;letter-spacing:-2px}
.hero .lbl{font-size:13px;font-weight:600;color:rgba(43,37,69,.5);margin-top:6px}
.list{margin-top:22px;display:flex;flex-direction:column;gap:2px}
.item{display:flex;align-items:center;gap:16px;padding:18px 4px;border-bottom:1px solid rgba(43,37,69,.08)}
.item:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.iname{font-size:17px;font-weight:600;color:#2b2545}
.isub{font-size:12px;color:rgba(43,37,69,.45);margin-top:2px;font-weight:500}
.spacer{flex:1}
.chk{width:26px;height:26px;border-radius:50%;border:1.8px solid rgba(43,37,69,.2);display:flex;align-items:center;justify-content:center}
.chk.done{background:#2b2545;border-color:#2b2545}
.pct{font-size:14px;font-weight:700;color:rgba(43,37,69,.5)}
.ringwrap{margin-top:26px;display:flex;flex-direction:column;align-items:center}
.tabbar{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(20,18,30,.8);backdrop-filter:blur(20px);display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,255,255,.08);z-index:50}
.tb{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.45)}
.tb.act{background:linear-gradient(135deg,#ff9ecb,#a9c7ff);color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="sbar"><span>9:41</span><span>📶 🔋</span></div>

  <div class="hello">
    <div class="day">Пятница · 19 июня</div>
    <h1>Добрый день</h1>
    <p>2 из 5 привычек закрыто</p>
  </div>

  <!-- Single hero: streak with flame -->
  <div class="hero">
    <svg viewBox="0 0 48 64" width="58" height="78"><defs><linearGradient id="FL33" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL33)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
    <div>
      <div class="num">21</div>
      <div class="lbl">дней серии · твой рекорд</div>
    </div>
  </div>

  <!-- One glass card with the whole list -->
  <div class="w" style="margin-top:24px">
    <div class="list">
      <div class="item">
        <div class="dot" style="background:#5c9a80"></div>
        <div><div class="iname">Зарядка</div><div class="isub">серия 14</div></div>
        <div class="spacer"></div>
        <div class="chk done"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="item">
        <div class="dot" style="background:#ae8a5a"></div>
        <div><div class="iname">Читать</div><div class="isub">80 / 100 стр · серия 21</div></div>
        <div class="spacer"></div>
        <div class="pct">80%</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#5e83a8"></div>
        <div><div class="iname">Вода</div><div class="isub">1.2 / 2 л · серия 4</div></div>
        <div class="spacer"></div>
        <div class="pct">60%</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#9a7aa0"></div>
        <div><div class="iname">Не курить</div><div class="isub">серия 8</div></div>
        <div class="spacer"></div>
        <div class="chk done"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>
      <div class="item">
        <div class="dot" style="background:#7e9667"></div>
        <div><div class="iname">Кофе</div><div class="isub">1 / ≤2 · серия 3</div></div>
        <div class="spacer"></div>
        <div class="chk"></div>
      </div>
    </div>
  </div>
</div>
<div class="tabbar">
  <div class="tb act"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6h-6v6H5a2 2 0 01-2-2z"/></svg></div>
  <div class="tb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></div>
  <div class="tb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9M10 19V5M16 19v-7M20 19h-1"/></svg></div>
  <div class="tb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></div>
</div>
</div>
</body>
</html>
