<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>01 · Heatmap</title>
<style>
:root{--bg:#f4f3f0;--ink:#20211d;--soft:#8c887f;--faint:#b6b2a8;--card:#fff;--hair:#e7e4dd}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"SF Pro Text",Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;background:var(--bg);overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:18px}
.date{font-size:11px;letter-spacing:1.5px;color:var(--faint);font-weight:700;text-transform:uppercase}
.h1{font-size:28px;font-weight:800;color:var(--ink);margin:2px 0 16px}
.hero{background:#26302b;border-radius:24px;padding:18px;display:flex;align-items:center;gap:16px;margin-bottom:18px}
.ring{width:54px;height:54px;border-radius:50%;background:conic-gradient(#8fe3b5 144deg,#3a463f 0);display:flex;align-items:center;justify-content:center}
.ring i{width:42px;height:42px;border-radius:50%;background:#26302b;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:800;font-style:normal}
.hero h3{color:#fff;font-size:17px}.hero p{color:#9aa39c;font-size:13px;margin-top:2px}
.row{background:var(--card);border-radius:18px;padding:14px;margin-bottom:10px}
.rt{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.rt b{font-size:15px;color:var(--ink)}.rt span{font-size:12px;color:var(--soft);display:block;margin-top:1px}
.fl{margin-left:auto;font-size:12px;color:var(--soft);font-weight:700}
.cells{display:flex;gap:4px}
.c{flex:1;height:16px;border-radius:4px;background:var(--hair)}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=date>Пятница · 19 июня</div><div class=h1>Добрый день</div>
<div class=hero><div class=ring><i>2/5</i></div><div><h3>Ты на ходу</h3><p>Осталось 3 · серия 21 день</p></div></div>
<div class=row><div class=rt><div class=ic style="background:#dcebe0;color:#5c9a80">🏃</div><div><b>Зарядка</b><span>сделано сегодня</span></div><span class=fl>🔥14</span></div><div class=cells></div></div>
<div class=row><div class=rt><div class=ic style="background:#efe6d3;color:#ae8a5a">📖</div><div><b>Читать</b><span>80 / 100 стр</span></div><span class=fl>🔥21</span></div><div class=cells></div></div>
<div class=row><div class=rt><div class=ic style="background:#dde6ef;color:#5e83a8">💧</div><div><b>Вода</b><span>1.2 / 2 л</span></div><span class=fl>🔥4</span></div><div class=cells></div></div>
<div class=row><div class=rt><div class=ic style="background:#e9e0ed;color:#9a7aa0">🚭</div><div><b>Не курить</b><span>отметить воздержание</span></div><span class=fl>🔥8</span></div><div class=cells></div></div>
</div></div>
<script>
const hues={0:'#5c9a80',1:'#ae8a5a',2:'#5e83a8',3:'#9a7aa0'};
document.querySelectorAll('.cells').forEach((el,r)=>{for(let i=0;i<13;i++){const c=document.createElement('div');c.className='c';const on=Math.random()>(r==3?.5:.35);if(on)c.style.background=hues[r];if(i==0)c.style.boxShadow='0 0 0 2px '+hues[r];el.appendChild(c)}});
</script></body></html>
