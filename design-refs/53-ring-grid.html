<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · Ring Grid</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sbar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.greet{margin-top:18px}
.greet h1{font-size:25px;color:#2b2545;font-weight:800;letter-spacing:-.5px}
.greet p{font-size:14px;color:#6b6388;margin-top:3px}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;position:relative;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.pill{display:inline-block;background:rgba(255,126,179,.18);color:#c2477f;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
/* summary big ring */
.sum{display:flex;align-items:center;gap:16px}
.ringwrap{position:relative;flex-shrink:0}
.ringtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringtxt b{font-size:22px;color:#2b2545;font-weight:800}
.ringtxt span{font-size:10px;color:#6b6388}
.sum .msg{font-size:12px;color:#6b6388;margin-top:8px;line-height:1.45}
/* ring tiles */
.rt{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.rtwrap{position:relative}
.rttxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.rt .name{font-size:13px;font-weight:700;color:#2b2545;margin-top:8px}
.rt .meta{font-size:11px;color:#6b6388;margin-top:1px}
.rt .mini{font-size:10px;color:#8a7bff;font-weight:700;margin-top:3px}
/* streak compact */
.streak{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.streak .num{font-size:30px;font-weight:800;color:#2b2545;line-height:1}
.streak .lbl{font-size:11px;color:#6b6388}
.days{display:flex;gap:5px;margin-top:10px}
.day{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.day.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff}
.day.off{background:rgba(120,110,170,.15);color:#9a93b0}
/* tap tile */
.taptile{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;cursor:pointer}
.taptile .ic{font-size:22px}
.tap{width:48px;height:48px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#b0a3c8;cursor:pointer;transition:.25s}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
.taptile .name{font-size:13px;font-weight:700;color:#2b2545}
.taptile .mini{font-size:10px;color:#8a7bff;font-weight:700}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="sbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="greet"><h1>Добрый день</h1><p>Пятница · 19 июня</p></div>

  <div class="w sum" style="margin-top:16px">
    <div class="ringwrap">
      <svg width=110 height=110 viewBox="0 0 110 110"><circle cx=55 cy=55 r=46 fill=none stroke="rgba(120,110,170,.18)" stroke-width=10/><circle cx=55 cy=55 r=46 fill=none stroke="url(#R)" stroke-width=10 stroke-linecap=round stroke-dasharray=289 stroke-dashoffset=173 transform="rotate(-90 55 55)"/><defs><linearGradient id=R x1=0 y1=0 x2=1 y2=1><stop offset=0 stop-color=#ff7eb3/><stop offset=1 stop-color=#8a7bff/></linearGradient></defs></svg>
      <div class="ringtxt"><b>40%</b><span>2 из 5</span></div>
    </div>
    <div>
      <span class="pill">Сегодня</span>
      <div class="msg">Осталось 3 привычки. Вода, чтение и кофе ждут. Ты молодец!</div>
    </div>
  </div>

  <div class="grid">
    <!-- Water ring -->
    <div class="w sq rt">
      <div class="rtwrap">
        <svg width=90 height=90 viewBox="0 0 90 90"><circle cx=45 cy=45 r=37 fill=none stroke="rgba(120,110,170,.18)" stroke-width=9/><circle cx=45 cy=45 r=37 fill=none stroke="#5e83a8" stroke-width=9 stroke-linecap=round stroke-dasharray=232 stroke-dashoffset=93 transform="rotate(-90 45 45)"/></svg>
        <div class="rttxt">💧</div>
      </div>
      <div class="name">Вода</div>
      <div class="meta">1.2 / 2 л · 60%</div>
      <div class="mini">серия 4</div>
    </div>

    <!-- Reading ring -->
    <div class="w sq rt">
      <div class="rtwrap">
        <svg width=90 height=90 viewBox="0 0 90 90"><circle cx=45 cy=45 r=37 fill=none stroke="rgba(120,110,170,.18)" stroke-width=9/><circle cx=45 cy=45 r=37 fill=none stroke="#ae8a5a" stroke-width=9 stroke-linecap=round stroke-dasharray=232 stroke-dashoffset=46 transform="rotate(-90 45 45)"/></svg>
        <div class="rttxt">📖</div>
      </div>
      <div class="name">Читать</div>
      <div class="meta">80 / 100 · 80%</div>
      <div class="mini">серия 21</div>
    </div>

    <!-- Streak -->
    <div class="w sq streak">
      <svg viewBox="0 0 48 64" width="30" height="40"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
      <div class="num">21</div><div class="lbl">дней подряд</div>
      <div class="days">
        <div class="day on">Пн</div><div class="day on">Вт</div><div class="day on">Ср</div><div class="day on">Чт</div><div class="day on">Пт</div><div class="day off">Сб</div><div class="day off">Вс</div>
      </div>
    </div>

    <!-- Зарядка tap -->
    <div class="w sq taptile" data-tap>
      <div class="ic">🏃</div>
      <div class="tap">○</div>
      <div class="name">Зарядка</div>
      <div class="mini">серия 14</div>
    </div>

    <!-- Не курить tap -->
    <div class="w sq taptile" data-tap>
      <div class="ic">🚭</div>
      <div class="tap">○</div>
      <div class="name">Не курить</div>
      <div class="mini">серия 8</div>
    </div>

    <!-- Кофе tap -->
    <div class="w sq taptile" data-tap>
      <div class="ic">☕</div>
      <div class="tap">○</div>
      <div class="name">Кофе</div>
      <div class="mini">1 / ≤2 · серия 3</div>
    </div>
  </div>
</div>
</div>
<script>
document.querySelectorAll('[data-tap]').forEach(c=>{
  c.addEventListener('click',()=>{
    const t=c.querySelector('.tap');
    t.classList.toggle('done');
    t.textContent=t.classList.contains('done')?'✓':'○';
  });
});
</script>
</body>
</html>
