<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>20 · Streak</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#fff;background:linear-gradient(180deg,#2a1709,#161213 38%,#0f0d0e)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:10px}
.hero{text-align:center;padding:14px 0 22px}
.flame{font-size:62px;filter:drop-shadow(0 0 22px rgba(255,140,40,.7))}
.big{font-size:64px;font-weight:900;line-height:1;background:linear-gradient(180deg,#ffd36b,#ff8a3d);-webkit-background-clip:text;background-clip:text;color:transparent}
.cap{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#c79a6a;font-weight:700;margin-top:4px}
.xpbar{height:10px;border-radius:6px;background:#2a2422;margin:16px 6px 4px;overflow:hidden}
.xpbar i{display:block;height:100%;width:64%;background:linear-gradient(90deg,#ff8a3d,#ffd36b)}
.xpt{display:flex;justify-content:space-between;font-size:11px;color:#9a8d82;padding:0 6px;margin-bottom:20px}
.lvl{background:#1c1917;border:1px solid #2a2422;border-radius:18px;padding:13px 14px;margin-bottom:11px;display:flex;align-items:center;gap:13px}
.ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px}
.lvl b{font-size:15px}.lvl .s{font-size:12px;color:#9a8d82}
.sbar{height:6px;border-radius:4px;background:#2a2422;margin-top:7px;overflow:hidden}
.sbar i{display:block;height:100%}
.badge{margin-left:auto;text-align:center;background:#241c14;border:1px solid #3a2c1a;border-radius:12px;padding:6px 9px}
.badge b{display:block;font-size:16px;color:#ffb15c}.badge span{font-size:9px;color:#9a8d82;text-transform:uppercase;letter-spacing:1px}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=hero><div class=flame>🔥</div><div class=big>21</div><div class=cap>дней подряд</div></div>
<div class=xpbar><i></i></div><div class=xpt><span>Уровень 4 · «Дисциплина»</span><span>640/1000 XP</span></div>
<div class=lvl><div class=ic style="background:rgba(92,154,128,.2)">🏃</div><div style="flex:1"><b>Зарядка</b><div class=s>сделано сегодня</div><div class=sbar><i style="width:100%;background:#5c9a80"></i></div></div><div class=badge><b>14</b><span>дней</span></div></div>
<div class=lvl><div class=ic style="background:rgba(174,138,90,.2)">📖</div><div style="flex:1"><b>Читать</b><div class=s>80/100 стр</div><div class=sbar><i style="width:80%;background:#ae8a5a"></i></div></div><div class=badge><b>21</b><span>дней</span></div></div>
<div class=lvl><div class=ic style="background:rgba(94,131,168,.2)">💧</div><div style="flex:1"><b>Вода</b><div class=s>1.2/2 л</div><div class=sbar><i style="width:60%;background:#5e83a8"></i></div></div><div class=badge><b>4</b><span>дня</span></div></div>
<div class=lvl><div class=ic style="background:rgba(154,122,160,.2)">🚭</div><div style="flex:1"><b>Не курить</b><div class=s>отметить воздержание</div><div class=sbar><i style="width:0%;background:#9a7aa0"></i></div></div><div class=badge><b>8</b><span>дней</span></div></div>
</div></div></body></html>
