<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio — Dense Light</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 16px 90px;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.scr::-webkit-scrollbar{display:none}
.bar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.greet{margin-top:12px;display:flex;align-items:flex-end;justify-content:space-between}
.greet h1{font-size:21px;color:#2b2545;font-weight:800;letter-spacing:-.5px}
.greet p{font-size:12px;color:#6b6388;font-weight:600}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.6);border-radius:20px;box-shadow:0 8px 22px rgba(120,90,160,.14);padding:11px;position:relative;overflow:hidden}
.t{font-size:12px;font-weight:800;color:#2b2545;line-height:1.15}
.s{font-size:10px;color:#6b6388;font-weight:600}
.streak-mini{font-size:9px;font-weight:800;color:#8a7bff;background:rgba(138,123,255,.14);padding:2px 6px;border-radius:14px}
.row{display:flex;align-items:center;justify-content:space-between}
/* wide summary */
.summary{margin-top:14px;display:flex;align-items:center;gap:12px;padding:13px 14px}
.summary .pillday{font-size:10px;font-weight:800;color:#8a7bff;background:rgba(255,255,255,.55);padding:3px 9px;border-radius:18px;display:inline-block;margin-bottom:4px}
.summary h2{font-size:18px;color:#2b2545;font-weight:900}
/* wide streak */
.streak{margin-top:11px;display:flex;align-items:center;gap:12px;padding:12px 14px}
.num{font-size:30px;font-weight:900;color:#2b2545;letter-spacing:-1px;line-height:1}
.days{display:flex;gap:4px;margin-top:4px}
.pd{font-size:9px;font-weight:800;flex:1;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.pd.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff}
.pd.off{background:rgba(120,110,170,.15);color:#9a93b0}
/* 3-col grid */
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:11px}
.cell{aspect-ratio:1/1;display:flex;flex-direction:column;justify-content:space-between;padding:10px}
.emo{font-size:18px}
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.9}
.liquid .wfill::before{content:"";position:absolute;top:-7px;left:0;right:0;height:14px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.tap{width:38px;height:38px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#b0a3c8;cursor:pointer;transition:.2s;flex-shrink:0}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div><div class="scr">
<div class="bar"><span>9:41</span><span>📶 🔋</span></div>
<div class="greet"><h1>Добрый день</h1><p>Пятница · 19 июня</p></div>

<!-- wide summary -->
<div class="w summary">
<svg width="64" height="64" viewBox="0 0 110 110"><circle cx="55" cy="55" r="46" fill="none" stroke="rgba(120,110,170,.18)" stroke-width="11"/><circle cx="55" cy="55" r="46" fill="none" stroke="url(#R)" stroke-width="11" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="173" transform="rotate(-90 55 55)"/><defs><linearGradient id="R" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs></svg>
<div><span class="pillday">Сегодня</span><h2>2 из 5 · 40%</h2><div class="s" style="margin-top:3px">Осталось 3 привычки. Вода, чтение и кофе ждут. Ты молодец!</div></div>
</div>

<!-- wide streak -->
<div class="w streak">
<svg viewBox="0 0 48 64" width="30" height="40"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div style="flex:1">
<div class="row"><span class="num">21</span><span class="s">дней подряд</span></div>
<div class="days">
<div class="pd on">Пн</div><div class="pd on">Вт</div><div class="pd on">Ср</div><div class="pd on">Чт</div><div class="pd on">Пт</div><div class="pd off">Сб</div><div class="pd off">Вс</div>
</div>
</div>
</div>

<!-- 3-col compact -->
<div class="g3">
<div class="w cell liquid" style="--lvl:80%;--c1:#c2a06b;--c2:#ae8a5a">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="emo">📖</span><span class="streak-mini">21</span></div>
<div><div class="t">Читать</div><div class="s">80/100</div></div>
</div>
</div>
<div class="w cell liquid" style="--lvl:60%;--c1:#7fb0e0;--c2:#5e83a8">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="emo">💧</span><span class="streak-mini">4</span></div>
<div><div class="t">Вода</div><div class="s">1.2/2 л</div></div>
</div>
</div>
<div class="w cell liquid" style="--lvl:50%;--c1:#9bb27e;--c2:#7e9667">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="emo">☕</span><span class="streak-mini">3</span></div>
<div><div class="t">Кофе</div><div class="s">1 / ≤2</div></div>
</div>
</div>
<div class="w cell">
<div class="row"><span class="emo">🏃</span><span class="streak-mini">14</span></div>
<div class="row" style="align-items:flex-end"><span class="t">Зарядка</span><div class="tap" onclick="this.classList.toggle('done')">✓</div></div>
</div>
<div class="w cell">
<div class="row"><span class="emo">🚭</span><span class="streak-mini">8</span></div>
<div class="row" style="align-items:flex-end"><span class="t">Не курить</span><div class="tap" onclick="this.classList.toggle('done')">✓</div></div>
</div>
<div class="w cell" style="align-items:center;justify-content:center;text-align:center;cursor:pointer">
<div style="font-size:26px;color:#8a7bff;line-height:1">＋</div>
<div class="s" style="margin-top:4px">Привычка</div>
</div>
</div>
</div></div>
</body>
</html>
