<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>42 · Liquid Focus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#2b2545;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.h1{font-size:25px;font-weight:800;margin-top:18px}.date{font-size:13px;color:#6b6388;margin-top:3px;font-weight:500}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;position:relative;overflow:hidden}
.sq{aspect-ratio:1/1}.wide{grid-column:span 2}
.wt{font-size:12px;font-weight:700;color:#6b6388;display:flex;align-items:center;gap:6px}
.wbig{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}.wsub{font-size:11px;color:#54506e;font-weight:600}
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.9}
.liquid .wfill::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.days{display:flex;gap:5px;margin-top:10px}.day{flex:1;text-align:center;font-size:11px;font-weight:700;padding:7px 0;border-radius:9px}
.day.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff}.day.off{background:rgba(120,110,170,.15);color:#9a93b0}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=h1>Добрый день</div><div class=date>Пятница · 19 июня · 2 из 5 закрыто</div>
<div class=grid>
<div class="w wide"><div style="display:flex;align-items:center;gap:14px">
<svg viewBox="0 0 48 64" width=40 height=53><defs><linearGradient id=FL x1=0 y1=0 x2=0 y2=1><stop offset=0 stop-color=#ffd36b/><stop offset=.45 stop-color=#ff7eb3/><stop offset=1 stop-color=#8a7bff/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill=#fff opacity=.55/></svg>
<div><div class=wbig style="font-size:30px">21</div><div class=wsub>дней подряд</div></div></div>
<div class=days><div class="day on">Пн</div><div class="day on">Вт</div><div class="day on">Ср</div><div class="day on">Чт</div><div class="day on">Пт</div><div class="day off">Сб</div><div class="day off">Вс</div></div></div>
<div class="w sq liquid" style="--lvl:60%;--c1:#7fb0e0;--c2:#5e83a8"><div class=wfill></div><div class=content><div class=wt>💧 Вода</div><div><div class=wbig>1.2<span style="font-size:13px">/2 л</span></div><div class=wsub>серия 4 дня</div></div></div></div>
<div class="w sq liquid" style="--lvl:80%;--c1:#cBac7a;--c2:#ae8a5a"><div class=wfill></div><div class=content><div class=wt>📖 Читать</div><div><div class=wbig>80<span style="font-size:13px">/100</span></div><div class=wsub>серия 21</div></div></div></div>
<div class="w sq liquid" style="--lvl:50%;--c1:#9bb084;--c2:#7e9667"><div class=wfill></div><div class=content><div class=wt>☕ Кофе</div><div><div class=wbig>1<span style="font-size:13px">/≤2</span></div><div class=wsub>в норме · 3</div></div></div></div>
<div class="w sq"><div class=wt>🏃 Зарядка</div><div style="margin-top:14px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#5c9a80,#4f9e86);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800">✓</div><div class=wsub style="margin-top:10px">сделано · серия 14</div></div>
</div></div></div></body></html>
