<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>03 · Hero Number</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;background:#faf8f4;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 24px 90px;color:#1a1a1a}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:40px}
.lab{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#b0aaa0;font-weight:700}
.huge{font-size:120px;font-weight:200;line-height:.9;letter-spacing:-4px;margin:6px 0}
.huge small{font-size:28px;font-weight:400;color:#b0aaa0}
.prog{height:6px;border-radius:3px;background:#ece8e0;margin:18px 0 50px;overflow:hidden}
.prog i{display:block;height:100%;width:40%;background:#1a1a1a;border-radius:3px}
.next{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#b0aaa0;font-weight:700;margin-bottom:16px}
.item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #ece8e0}
.dot{width:10px;height:10px;border-radius:50%;border:2px solid #1a1a1a}
.dot.done{background:#1a1a1a}
.item b{font-size:17px;font-weight:500}.item span{margin-left:auto;color:#b0aaa0;font-size:14px}
.item.done b{color:#b0aaa0;text-decoration:line-through}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=lab>Прогресс дня</div>
<div class=huge>40<small>%</small></div>
<div class=prog><i></i></div>
<div class=next>Осталось сегодня</div>
<div class="item done"><div class="dot done"></div><b>Зарядка</b><span>✓</span></div>
<div class=item><div class=dot></div><b>Читать</b><span>80/100</span></div>
<div class=item><div class=dot></div><b>Вода</b><span>1.2/2 л</span></div>
<div class=item><div class=dot></div><b>Не курить</b><span>отметить</span></div>
<div class=item><div class=dot></div><b>Кофе</b><span>1/2</span></div>
</div></div></body></html>
