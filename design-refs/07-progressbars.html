<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klio · Progress</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 22px 90px;background:#fcfbf9;color:#222019}

.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#3a382f}
.head{margin-top:34px}
.head .date{font-size:12px;color:#a09a8c;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.head h1{font-size:30px;font-weight:800;letter-spacing:-.8px;margin-top:6px}
.sumline{font-size:14px;color:#8c887c;margin-top:10px;font-weight:500}
.sumline b{color:#222019;font-weight:700}

.daybar{height:8px;border-radius:5px;background:#eeebe4;margin-top:18px;display:flex;overflow:hidden;gap:2px}
.daybar i{height:100%}

.list{margin-top:34px}
.item{padding:18px 0;border-bottom:1px solid #efece5}
.item:last-child{border-bottom:none}
.top{display:flex;align-items:center;gap:13px}
.ic{font-size:22px;width:30px;text-align:center}
.nm{font-size:16px;font-weight:650;flex:1}
.pct{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
.meta{font-size:12px;color:#a09a8c;margin-left:43px;margin-top:1px;font-weight:500}
.bar{height:6px;border-radius:4px;background:#efece5;margin:11px 0 0 43px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px;transition:width .4s}
.done .nm{color:#5c9a80}
.checkmini{font-size:13px;color:#5c9a80;font-weight:800}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div><div class="scr">
  <div class="status"><span>9:41</span><span>📶 🔋</span></div>
  <div class="head">
    <div class="date">Пятница · 19 июня</div>
    <h1>Добрый день</h1>
    <div class="sumline"><b>2 из 5</b> целей закрыто · общая серия <b>21 день</b> 🔥</div>
    <div class="daybar">
      <i style="width:20%;background:#5c9a80"></i>
      <i style="width:20%;background:#ae8a5a"></i>
      <i style="width:20%;background:#5e83a8"></i>
      <i style="width:20%;background:#9a7aa0"></i>
      <i style="width:20%;background:#7e9667"></i>
    </div>
  </div>

  <div class="list">
    <div class="item done">
      <div class="top"><span class="ic">🏃</span><span class="nm">Зарядка</span><span class="checkmini">✓ Готово</span></div>
      <div class="meta">Выполнено сегодня · серия 14</div>
      <div class="bar"><i style="width:100%;background:#5c9a80"></i></div>
    </div>

    <div class="item">
      <div class="top"><span class="ic">📖</span><span class="nm">Читать</span><span class="pct" style="color:#ae8a5a">80%</span></div>
      <div class="meta">80 / 100 стр · серия 21</div>
      <div class="bar"><i style="width:80%;background:#ae8a5a"></i></div>
    </div>

    <div class="item">
      <div class="top"><span class="ic">💧</span><span class="nm">Вода</span><span class="pct" style="color:#5e83a8">60%</span></div>
      <div class="meta">1.2 / 2 л · серия 4</div>
      <div class="bar"><i style="width:60%;background:#5e83a8"></i></div>
    </div>

    <div class="item">
      <div class="top"><span class="ic">🚭</span><span class="nm">Не курить</span><span class="pct" style="color:#9a7aa0">—</span></div>
      <div class="meta">Отметить воздержание · серия 8</div>
      <div class="bar"><i style="width:0%;background:#9a7aa0"></i></div>
    </div>

    <div class="item">
      <div class="top"><span class="ic">☕</span><span class="nm">Кофе</span><span class="pct" style="color:#7e9667">50%</span></div>
      <div class="meta">1 / ≤2 чаш · лимит · серия 3</div>
      <div class="bar"><i style="width:50%;background:#7e9667"></i></div>
    </div>
  </div>
</div></div>
</body>
</html>
