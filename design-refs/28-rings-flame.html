<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · 28 rings-flame</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.scr::-webkit-scrollbar{display:none}
.status{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.hi{margin-top:18px}
.hi h1{font-size:26px;color:#2b2545;letter-spacing:-.5px}
.hi p{font-size:13px;color:rgba(43,37,69,.6);margin-top:4px;font-weight:500}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.34);border:1px solid rgba(255,255,255,.55);border-radius:26px;box-shadow:0 10px 30px rgba(90,90,160,.16);padding:16px;position:relative;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.big{grid-column:span 2;min-height:170px}
.lbl{font-size:12px;font-weight:600;color:rgba(43,37,69,.62)}
.val{font-size:22px;font-weight:700;color:#2b2545;letter-spacing:-.5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.ringwrap{display:flex;align-items:center;justify-content:center;height:100%}
.center-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:rgba(255,126,179,.22);color:#a23a6b}
.tabbar{position:absolute;left:0;right:0;bottom:0;height:74px;background:rgba(34,24,46,.5);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;justify-content:space-around;align-items:center;border-top:1px solid rgba(255,255,255,.14);z-index:50}
.tab{width:24px;height:24px;border-radius:8px;opacity:.55}
.tab.on{opacity:1;background:rgba(255,160,200,.95)}
.flame-in-ring{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
</style>
</head>
<body>
<div class="phone">
<div class="notch"></div>
<div class="scr">
<div class="status"><span>9:41</span><span>📶 🔋</span></div>
<div class="hi">
<h1>Добрый день</h1>
<p>Пятница · 19 июня · 2 из 5 закрыто</p>
</div>

<div class="grid">
<!-- BIG triple concentric rings summary -->
<div class="w big">
<div style="display:flex;align-items:center;gap:14px;height:100%">
<div style="position:relative;width:140px;height:140px;flex-shrink:0">
<svg viewBox="0 0 140 140" width="140" height="140">
<circle cx="70" cy="70" r="60" fill="none" stroke="rgba(94,131,168,.18)" stroke-width="9"/>
<circle cx="70" cy="70" r="60" fill="none" stroke="#5e83a8" stroke-width="9" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="150" transform="rotate(-90 70 70)"/>
<circle cx="70" cy="70" r="47" fill="none" stroke="rgba(174,138,90,.18)" stroke-width="9"/>
<circle cx="70" cy="70" r="47" fill="none" stroke="#ae8a5a" stroke-width="9" stroke-linecap="round" stroke-dasharray="295" stroke-dashoffset="59" transform="rotate(-90 70 70)"/>
<circle cx="70" cy="70" r="34" fill="none" stroke="rgba(92,154,128,.18)" stroke-width="9"/>
<circle cx="70" cy="70" r="34" fill="none" stroke="#5c9a80" stroke-width="9" stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="0" transform="rotate(-90 70 70)"/>
</svg>
<div class="center-txt"><div class="val" style="font-size:28px">40%</div></div>
</div>
<div>
<span class="pill">Сегодня</span>
<div style="margin-top:12px">
<div class="lbl" style="margin:4px 0"><span class="dot" style="background:#5e83a8"></span> Вода 60%</div>
<div class="lbl" style="margin:4px 0"><span class="dot" style="background:#ae8a5a"></span> Чтение 80%</div>
<div class="lbl" style="margin:4px 0"><span class="dot" style="background:#5c9a80"></span> Зарядка 100%</div>
</div>
</div>
</div>
</div>

<!-- STREAK ring with flame inside -->
<div class="w sq">
<div class="lbl">Серия</div>
<div style="position:relative;width:100%;height:calc(100% - 18px);display:flex;align-items:center;justify-content:center">
<svg viewBox="0 0 120 120" width="118" height="118" style="position:absolute">
<circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,126,179,.18)" stroke-width="10"/>
<circle cx="60" cy="60" r="50" fill="none" stroke="url(#ringgrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="63" transform="rotate(-90 60 60)"/>
<defs><linearGradient id="ringgrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset="1" stop-color="#ff7eb3"/></linearGradient></defs>
</svg>
<div class="flame-in-ring">
<svg viewBox="0 0 48 64" width="30" height="40"><defs><linearGradient id="FL28" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL28)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div class="val" style="font-size:24px;margin-top:2px">21</div>
<div class="lbl" style="font-size:10px">дней</div>
</div>
</div>
</div>

<!-- water ring -->
<div class="w sq">
<div class="lbl"><span class="dot" style="background:#5e83a8"></span> Вода</div>
<div style="position:relative;display:flex;align-items:center;justify-content:center;margin-top:6px">
<svg viewBox="0 0 110 110" width="106" height="106">
<circle cx="55" cy="55" r="45" fill="none" stroke="rgba(94,131,168,.18)" stroke-width="10"/>
<circle cx="55" cy="55" r="45" fill="none" stroke="#5e83a8" stroke-width="10" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="113" transform="rotate(-90 55 55)"/>
<text x="55" y="52" text-anchor="middle" font-size="20" font-weight="700" fill="#2b2545">1.2л</text>
<text x="55" y="68" text-anchor="middle" font-size="10" fill="rgba(43,37,69,.55)">из 2</text>
</svg>
</div>
</div>

<!-- reading ring wide -->
<div class="w wide">
<div style="display:flex;align-items:center;gap:16px">
<div style="position:relative;flex-shrink:0">
<svg viewBox="0 0 90 90" width="80" height="80">
<circle cx="45" cy="45" r="37" fill="none" stroke="rgba(174,138,90,.18)" stroke-width="9"/>
<circle cx="45" cy="45" r="37" fill="none" stroke="#ae8a5a" stroke-width="9" stroke-linecap="round" stroke-dasharray="232" stroke-dashoffset="46" transform="rotate(-90 45 45)"/>
<text x="45" y="50" text-anchor="middle" font-size="17" font-weight="700" fill="#2b2545">80%</text>
</svg>
</div>
<div>
<div class="lbl"><span class="dot" style="background:#ae8a5a"></span> Читать</div>
<div class="val" style="margin-top:4px">80 / 100 <span style="font-size:13px;color:rgba(43,37,69,.5)">стр</span></div>
<div class="lbl" style="margin-top:2px">серия 21 день</div>
</div>
</div>
</div>

<!-- quit check ring -->
<div class="w sq">
<div class="lbl"><span class="dot" style="background:#9a7aa0"></span> Не курить</div>
<div style="position:relative;display:flex;align-items:center;justify-content:center;margin-top:6px">
<svg viewBox="0 0 110 110" width="100" height="100">
<circle cx="55" cy="55" r="45" fill="none" stroke="rgba(154,122,160,.18)" stroke-width="10"/>
<circle cx="55" cy="55" r="45" fill="none" stroke="#9a7aa0" stroke-width="10" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="0" transform="rotate(-90 55 55)"/>
</svg>
<div class="center-txt"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#9a7aa0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4 10-11"/></svg><div class="lbl" style="font-size:10px;margin-top:2px">да · 8</div></div>
</div>
</div>

<!-- coffee ring -->
<div class="w sq">
<div class="lbl"><span class="dot" style="background:#7e9667"></span> Кофе</div>
<div style="position:relative;display:flex;align-items:center;justify-content:center;margin-top:6px">
<svg viewBox="0 0 110 110" width="100" height="100">
<circle cx="55" cy="55" r="45" fill="none" stroke="rgba(126,150,103,.18)" stroke-width="10"/>
<circle cx="55" cy="55" r="45" fill="none" stroke="#7e9667" stroke-width="10" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="142" transform="rotate(-90 55 55)"/>
<text x="55" y="52" text-anchor="middle" font-size="20" font-weight="700" fill="#2b2545">1</text>
<text x="55" y="68" text-anchor="middle" font-size="10" fill="rgba(43,37,69,.55)">из ≤2</text>
</svg>
</div>
</div>
</div>
</div>

<div class="tabbar">
<div class="tab on"></div><div class="tab"></div><div class="tab"></div><div class="tab"></div>
</div>
</div>
</body>
</html>
