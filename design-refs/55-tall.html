<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · Tall Columns</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sbar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#2b2545}
.greet{margin-top:18px}
.greet h1{font-size:25px;color:#2b2545;font-weight:800;letter-spacing:-.5px}
.greet p{font-size:14px;color:#6b6388;margin-top:3px}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;position:relative;overflow:hidden}
.pill{display:inline-block;background:rgba(255,126,179,.18);color:#c2477f;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
/* summary */
.sum{display:flex;align-items:center;gap:14px;margin-top:16px}
.ringwrap{position:relative;flex-shrink:0}
.ringtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringtxt b{font-size:21px;color:#2b2545;font-weight:800}
.ringtxt span{font-size:10px;color:#6b6388}
.sum .msg{font-size:12px;color:#6b6388;margin-top:8px;line-height:1.45}
/* tall two columns: each column has vertical-stacked tall widgets */
.cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;align-items:start}
.col{display:flex;flex-direction:column;gap:14px}
.tall{min-height:200px}
.taller{min-height:240px}
/* tall flame/streak column */
.streakcol{display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:flex-start}
.streakcol .num{font-size:32px;font-weight:800;color:#2b2545;line-height:1;margin-top:6px}
.streakcol .lbl{font-size:11px;color:#6b6388}
.daysv{display:flex;flex-direction:column;gap:6px;margin-top:14px;width:100%}
.dayrow{display:flex;align-items:center;gap:8px}
.dayrow .dn{font-size:10px;color:#9a93b0;width:18px}
.dayrow .bar{flex:1;height:8px;border-radius:6px;background:rgba(120,110,170,.15)}
.dayrow.on .bar{background:linear-gradient(90deg,#ff7eb3,#8a7bff)}
/* tall liquid water column */
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.9}
.liquid .wfill::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column}
.watercol .ic{font-size:28px}
.watercol .name{font-size:17px;font-weight:800;color:#173b52;margin-top:6px}
.watercol .meta{font-size:12px;color:#173b52;opacity:.8;margin-top:2px}
.watercol .pct{margin-top:auto;font-size:30px;font-weight:800;color:#fff;opacity:.9}
/* tall reading column */
.readcol .ic{font-size:26px}
.readcol .name{font-size:16px;font-weight:800;color:#2b2545;margin-top:6px}
.readcol .meta{font-size:12px;color:#6b6388;margin-top:2px}
.vbar{margin-top:auto;width:100%;height:90px;border-radius:14px;background:rgba(174,138,90,.18);position:relative;overflow:hidden}
.vbar>i{position:absolute;left:0;right:0;bottom:0;height:80%;background:linear-gradient(180deg,#cba36e,#ae8a5a);border-radius:14px}
.vbarval{position:absolute;top:8px;left:0;right:0;text-align:center;font-size:14px;font-weight:800;color:#7a5a30;z-index:2}
/* tap columns */
.tapcol{display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;gap:10px;cursor:pointer;min-height:150px}
.tapcol .ic{font-size:26px}
.tapcol .name{font-size:15px;font-weight:800;color:#2b2545}
.tapcol .mini{font-size:10px;color:#8a7bff;font-weight:700}
.tap{width:52px;height:52px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:24px;color:#b0a3c8;cursor:pointer;transition:.25s}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
  <div class="sbar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="greet"><h1>Добрый день</h1><p>Пятница · 19 июня</p></div>

  <div class="w sum">
    <div class="ringwrap">
      <svg width=110 height=110 viewBox="0 0 110 110"><circle cx=55 cy=55 r=46 fill=none stroke="rgba(120,110,170,.18)" stroke-width=10/><circle cx=55 cy=55 r=46 fill=none stroke="url(#R)" stroke-width=10 stroke-linecap=round stroke-dasharray=289 stroke-dashoffset=173 transform="rotate(-90 55 55)"/><defs><linearGradient id=R x1=0 y1=0 x2=1 y2=1><stop offset=0 stop-color=#ff7eb3/><stop offset=1 stop-color=#8a7bff/></linearGradient></defs></svg>
      <div class="ringtxt"><b>40%</b><span>2 из 5</span></div>
    </div>
    <div>
      <span class="pill">Сегодня</span>
      <div class="msg">Осталось 3 привычки. Вода, чтение и кофе ждут. Ты молодец!</div>
    </div>
  </div>

  <div class="cols">
    <!-- left column -->
    <div class="col">
      <div class="w taller streakcol">
        <svg viewBox="0 0 48 64" width="36" height="48"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
        <div class="num">21</div><div class="lbl">дней подряд</div>
        <div class="daysv">
          <div class="dayrow on"><span class="dn">Пн</span><span class="bar"></span></div>
          <div class="dayrow on"><span class="dn">Вт</span><span class="bar"></span></div>
          <div class="dayrow on"><span class="dn">Ср</span><span class="bar"></span></div>
          <div class="dayrow on"><span class="dn">Чт</span><span class="bar"></span></div>
          <div class="dayrow on"><span class="dn">Пт</span><span class="bar"></span></div>
          <div class="dayrow"><span class="dn">Сб</span><span class="bar"></span></div>
          <div class="dayrow"><span class="dn">Вс</span><span class="bar"></span></div>
        </div>
      </div>

      <div class="w tall tapcol" data-tap>
        <div class="ic">🚭</div>
        <div class="tap">○</div>
        <div class="name">Не курить</div>
        <div class="mini">серия 8</div>
      </div>

      <div class="w tall readcol" style="display:flex;flex-direction:column">
        <div class="ic">📖</div>
        <div class="name">Читать</div>
        <div class="meta">80 / 100 стр · серия 21</div>
        <div class="vbar"><span class="vbarval">80%</span><i></i></div>
      </div>
    </div>

    <!-- right column -->
    <div class="col">
      <div class="w taller liquid watercol" style="--lvl:60%;--c1:#7fb0e0;--c2:#5e83a8">
        <div class="wfill"></div>
        <div class="content">
          <div class="ic">💧</div>
          <div class="name">Вода</div>
          <div class="meta">1.2 / 2 л · серия 4</div>
          <div class="pct">60%</div>
        </div>
      </div>

      <div class="w tall tapcol" data-tap>
        <div class="ic">🏃</div>
        <div class="tap">○</div>
        <div class="name">Зарядка</div>
        <div class="mini">серия 14</div>
      </div>

      <div class="w tall tapcol" data-tap>
        <div class="ic">☕</div>
        <div class="tap">○</div>
        <div class="name">Кофе</div>
        <div class="mini">1 / ≤2 · серия 3</div>
      </div>
    </div>
  </div>
</div>
</div>
<script>
document.querySelectorAll('[data-tap]').forEach(c=>{
  c.addEventListener('click',()=>{
    const t=c.querySelector('.tap');
    t.classList.toggle('done');
    t.textContent=t.classList.contains('done')?'✓':'○';
  });
});
</script>
</body>
</html>
