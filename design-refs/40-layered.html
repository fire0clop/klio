<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>40 · Layered</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 100px;color:#2b2545;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.h1{font-size:25px;font-weight:800;margin-top:20px}.date{font-size:13px;color:#6b6388;margin-top:3px;font-weight:500;margin-bottom:20px}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:26px;padding:16px;position:relative}
.wt{font-size:12px;font-weight:700;opacity:.7;display:flex;align-items:center;gap:6px}
.wbig{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}.wsub{font-size:11px;opacity:.65;font-weight:600}
.bar{height:8px;border-radius:5px;background:rgba(120,110,170,.18);overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:5px}
.chk{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
/* layered stack */
.stack{position:relative;height:560px}
.l{position:absolute;left:0;right:0}
.l1{top:0;z-index:5;box-shadow:0 18px 40px rgba(120,90,160,.28)}
.l2{top:120px;left:26px;right:-6px;z-index:4;box-shadow:0 16px 36px rgba(120,90,160,.22)}
.l3{top:236px;left:-6px;right:30px;z-index:3;box-shadow:0 14px 32px rgba(120,90,160,.2)}
.l4{top:352px;left:30px;right:0;z-index:2;box-shadow:0 12px 28px rgba(120,90,160,.18)}
.l5{top:452px;left:0;right:34px;z-index:1;box-shadow:0 10px 24px rgba(120,90,160,.16)}
.row{display:flex;align-items:center;gap:13px}
.ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
</style></head><body><div class=phone><div class=notch></div><div class=scr>
<div class=sb><span>9:41</span><span>📶 🔋</span></div>
<div class=h1>Добрый день</div><div class=date>Пятница · 19 июня · 2 из 5 закрыто</div>
<div class=stack>
<div class="w l l1" style="background:linear-gradient(135deg,rgba(255,170,210,.5),rgba(170,195,255,.45))"><div class=wt>◎ Серия</div>
<div style="display:flex;align-items:center;gap:12px;margin-top:4px">
<svg viewBox="0 0 48 64" width=46 height=62><defs><linearGradient id=FL x1=0 y1=0 x2=0 y2=1><stop offset=0 stop-color=#ffd36b/><stop offset=.45 stop-color=#ff7eb3/><stop offset=1 stop-color=#8a7bff/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill=#fff opacity=.55/></svg>
<div><div class=wbig style="font-size:30px">21 день</div><div class=wsub>подряд · лучший результат</div></div></div></div>
<div class="w l l2 row"><div class=ic style="background:rgba(92,154,128,.18)">🏃</div><div><div style="font-weight:700">Зарядка</div><div class=wsub>сделано сегодня · 14</div></div><div class=chk style="background:#5c9a80;margin-left:auto">✓</div></div>
<div class="w l l3"><div class=row><div class=ic style="background:rgba(174,138,90,.18)">📖</div><div><div style="font-weight:700">Читать</div><div class=wsub>80 / 100 стр · серия 21</div></div></div><div class=bar><i style="width:80%;background:#ae8a5a"></i></div></div>
<div class="w l l4"><div class=row><div class=ic style="background:rgba(94,131,168,.18)">💧</div><div><div style="font-weight:700">Вода</div><div class=wsub>1.2 / 2 л · серия 4</div></div></div><div class=bar><i style="width:60%;background:#5e83a8"></i></div></div>
<div class="w l l5 row"><div class=ic style="background:rgba(154,122,160,.18)">🚭</div><div><div style="font-weight:700">Не курить</div><div class=wsub>воздержался? · серия 8</div></div>
<div style="display:flex;gap:7px;margin-left:auto"><div class=chk style="width:36px;height:36px;font-size:16px;background:rgba(120,110,170,.15);color:#9a7aa0">✕</div><div class=chk style="width:36px;height:36px;font-size:16px;background:#9a7aa0">✓</div></div></div>
</div></div></div></body></html>
