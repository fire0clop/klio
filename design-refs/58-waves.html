<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio · waves</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;color:#2b2545;
background:radial-gradient(120% 80% at 0% 0%,#ffb3d9 0,transparent 50%),radial-gradient(120% 80% at 100% 6%,#a9c7ff 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#d4c2ff 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#d8e6ff)}
.sb{display:flex;justify-content:space-between;font-size:13px;font-weight:600}
.muted{color:#6b6388}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 12px 30px rgba(120,90,160,.16);padding:16px;position:relative;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.sq{aspect-ratio:1/1}
.wide{grid-column:span 2}
.head{margin-top:16px;display:flex;align-items:center;gap:14px}
.head .greet{font-size:13px;color:#6b6388;font-weight:600}
.head h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
.head .date{font-size:12px;color:#6b6388;margin-top:2px}
/* streak with wavy accent */
.streak{margin-top:16px;padding:0}
.streak .top{display:flex;align-items:center;gap:14px;padding:16px 16px 8px}
.streaknum{font-size:30px;font-weight:800;line-height:1;background:linear-gradient(135deg,#ff7eb3,#8a7bff);-webkit-background-clip:text;background-clip:text;color:transparent}
.streaklbl{font-size:11px;color:#6b6388;font-weight:600}
.days{display:flex;gap:5px;margin-left:auto}
.day{width:25px;height:31px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.day.on{background:linear-gradient(135deg,#ff7eb3,#8a7bff);color:#fff}
.day.off{background:rgba(120,110,170,.15);color:#9a93b0}
.wavestrip{display:block;width:100%;height:26px}
.sectitle{font-size:14px;font-weight:800;margin:20px 4px 0;letter-spacing:-.2px}
/* liquid + waves */
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.92}
.wavetop{position:absolute;left:0;right:0;height:22px;z-index:2}
.wavetop svg{display:block;width:200%;height:100%}
.w1{bottom:calc(var(--lvl,60%) - 11px);animation:slide 6s linear infinite;opacity:.55}
.w2{bottom:calc(var(--lvl,60%) - 9px);animation:slide 4s linear infinite reverse;opacity:.8}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.htitle{font-size:14px;font-weight:700}
.hsub{font-size:12px;color:#4b4368}
.streakmini{font-size:11px;color:#6b6388;font-weight:600}
.tap{width:48px;height:48px;border-radius:50%;border:2px solid #cdbfe0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#b0a3c8;cursor:pointer;transition:.25s;background:rgba(255,255,255,.45)}
.tap.done{background:linear-gradient(135deg,#5c9a80,#4f9e86);border-color:transparent;color:#fff}
.row{display:flex;align-items:center;justify-content:space-between}
.over{position:absolute;top:6px;right:12px;font-size:18px;z-index:5;animation:drip 2.4s infinite}
@keyframes drip{0%,100%{transform:translateY(0);opacity:.9}50%{transform:translateY(7px);opacity:.4}}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div>
<div class="scr">
<div class="sb"><span>9:41</span><span>📶 🔋</span></div>

<div class="head">
<svg viewBox="0 0 48 64" width="36" height="48"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd36b"/><stop offset=".45" stop-color="#ff7eb3"/><stop offset="1" stop-color="#8a7bff"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div><div class="greet">Добрый день</div><h1>Klio</h1><div class="date">Пятница · 19 июня</div></div>
</div>

<div class="w streak">
<div class="top">
<div><div class="streaknum">21</div><div class="streaklbl">дней подряд</div></div>
<div class="days">
<div class="day on">Пн</div><div class="day on">Вт</div><div class="day on">Ср</div><div class="day on">Чт</div><div class="day on">Пт</div><div class="day off">Сб</div><div class="day off">Вс</div>
</div>
</div>
<svg class="wavestrip" viewBox="0 0 340 26" preserveAspectRatio="none"><defs><linearGradient id="WG" x1=0 y1=0 x2=1 y2=0><stop offset=0 stop-color="#ff7eb3"/><stop offset=1 stop-color="#8a7bff"/></linearGradient></defs><path d="M0 16 Q42 4 85 16 T170 16 T255 16 T340 16 V26 H0 Z" fill="url(#WG)" opacity=".35"/><path d="M0 19 Q42 9 85 19 T170 19 T255 19 T340 19 V26 H0 Z" fill="url(#WG)" opacity=".6"/></svg>
</div>

<div class="sectitle">Сегодня</div>

<div class="grid">

<!-- Вода with waves -->
<div class="w sq liquid" style="--lvl:60%;--c1:#7fb0e0;--c2:#5e83a8">
<div class="wfill"></div>
<div class="wavetop w1"><svg viewBox="0 0 200 22" preserveAspectRatio="none"><path d="M0 11 Q25 0 50 11 T100 11 T150 11 T200 11 V22 H0Z" fill="#7fb0e0"/></svg></div>
<div class="wavetop w2"><svg viewBox="0 0 200 22" preserveAspectRatio="none"><path d="M0 11 Q25 2 50 11 T100 11 T150 11 T200 11 V22 H0Z" fill="#9cc3e8"/></svg></div>
<div class="content"><div class="htitle">💧 Вода</div><div><div class="hsub" style="color:#fff">1.2 / 2 л</div><div class="streakmini" style="color:#eef4fb">🔥 4 дня</div></div></div>
</div>

<!-- Читать with waves -->
<div class="w sq liquid" style="--lvl:80%;--c1:#c7a86a;--c2:#ae8a5a">
<div class="wfill"></div>
<div class="wavetop w1"><svg viewBox="0 0 200 22" preserveAspectRatio="none"><path d="M0 11 Q25 0 50 11 T100 11 T150 11 T200 11 V22 H0Z" fill="#c7a86a"/></svg></div>
<div class="wavetop w2"><svg viewBox="0 0 200 22" preserveAspectRatio="none"><path d="M0 11 Q25 2 50 11 T100 11 T150 11 T200 11 V22 H0Z" fill="#dcc491"/></svg></div>
<div class="content"><div class="htitle">📖 Читать</div><div><div class="hsub" style="color:#fff">80 / 100 стр.</div><div class="streakmini" style="color:#fdf6ea">🔥 21 день</div></div></div>
</div>

<!-- Зарядка tap -->
<div class="w sq">
<div class="content" style="height:100%;display:flex;flex-direction:column;justify-content:space-between">
<div class="htitle">🏃 Зарядка</div>
<div class="row"><span class="streakmini">🔥 14</span><div class="tap" onclick="this.classList.toggle('done')">✓</div></div>
</div>
</div>

<!-- Не курить tap done -->
<div class="w sq">
<div class="content" style="height:100%;display:flex;flex-direction:column;justify-content:space-between">
<div class="htitle">🚭 Не курить</div>
<div class="row"><span class="streakmini">🔥 8</span><div class="tap done" onclick="this.classList.toggle('done')">✓</div></div>
</div>
</div>

<!-- Кофе wide overflow waves -->
<div class="w wide liquid" style="--lvl:100%;--c1:#9bb37e;--c2:#7e9667;aspect-ratio:auto;min-height:92px">
<div class="wfill"></div>
<div class="over">☕</div>
<div class="wavetop w1" style="bottom:calc(100% - 11px)"><svg viewBox="0 0 200 22" preserveAspectRatio="none"><path d="M0 11 Q25 0 50 11 T100 11 T150 11 T200 11 V22 H0Z" fill="#9bb37e"/></svg></div>
<div class="content row" style="height:100%;align-items:center">
<div><div class="htitle" style="color:#fff">☕ Кофе</div><div class="hsub" style="color:#f4f7ec">1 / ≤ 2 · перебор близко · 🔥 3</div></div>
</div>
</div>

</div>
</div></div>
</body>
</html>
