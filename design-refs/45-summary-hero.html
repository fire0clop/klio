.wbig{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}.wsub{font-size:11px;color:#54506e;font-weight:600}

.liquid .wfill::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.ringn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringn b{font-size:26px;font-weight:800;line-height:1}.ringn span{font-size:11px;color:#6b6388;font-weight:600}
