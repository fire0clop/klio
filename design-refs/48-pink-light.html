<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klio — Pink Light</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,Inter,system-ui,sans-serif}
body{background:#0e0e10;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
.phone{width:340px;height:720px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#000;border-radius:14px;z-index:99}
.scr{position:absolute;inset:0;overflow-y:auto;padding:56px 18px 90px;background:radial-gradient(120% 80% at 0% 0%,#ffb0d4 0,transparent 52%),radial-gradient(120% 80% at 100% 4%,#ffc8e2 0,transparent 50%),radial-gradient(100% 90% at 50% 100%,#ffd5e8 0,transparent 55%),linear-gradient(160deg,#ffe1ef,#ffd0e6)}
.scr::-webkit-scrollbar{display:none}
.bar{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#5a1f3e}
.greet{margin-top:14px}
.greet h1{font-size:26px;color:#5a1f3e;font-weight:800;letter-spacing:-.5px}
.greet p{font-size:13px;color:#a85d80;margin-top:2px;font-weight:600}
.w{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,235,245,.5);border:1px solid rgba(255,255,255,.7);border-radius:28px;box-shadow:0 12px 30px rgba(220,90,150,.18);padding:16px;position:relative;overflow:hidden}
.t{font-size:14px;font-weight:800;color:#5a1f3e}
.s{font-size:12px;color:#a85d80;font-weight:600}
.streak-mini{font-size:11px;font-weight:800;color:#d6437f;background:rgba(255,126,179,.2);padding:3px 8px;border-radius:20px}
.row{display:flex;align-items:center;justify-content:space-between}
.summary{margin-top:16px;display:flex;align-items:center;gap:16px}
.summary .pillday{font-size:11px;font-weight:800;color:#d6437f;background:rgba(255,126,179,.22);padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:6px}
.summary h2{font-size:22px;color:#5a1f3e;font-weight:900}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.sq{aspect-ratio:1/1}.wide{grid-column:span 2}
.tile{display:flex;flex-direction:column;justify-content:space-between;padding:15px}
.streak{margin-top:16px;display:flex;align-items:center;gap:14px}
.num{font-size:40px;font-weight:900;color:#5a1f3e;letter-spacing:-1px;line-height:1}
.days{display:flex;gap:6px;margin-top:4px}
.pd{font-size:11px;font-weight:800;flex:1;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.pd.on{background:linear-gradient(135deg,#ff7eb3,#ff5fa0);color:#fff;box-shadow:0 4px 10px rgba(255,95,160,.3)}
.pd.off{background:rgba(220,90,150,.12);color:#c98bab}
.liquid .wfill{position:absolute;left:0;right:0;bottom:0;height:var(--lvl,60%);background:linear-gradient(180deg,var(--c1),var(--c2));opacity:.9}
.liquid .wfill::before{content:"";position:absolute;top:-9px;left:0;right:0;height:18px;background:var(--c1);border-radius:45%;opacity:.9}
.liquid .content{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.tap{width:48px;height:48px;border-radius:50%;border:2px solid #f0bcd4;display:flex;align-items:center;justify-content:center;font-size:22px;color:#e090b5;cursor:pointer;transition:.2s;flex-shrink:0}
.tap.done{background:linear-gradient(135deg,#ff7eb3,#d6437f);border-color:transparent;color:#fff}
</style>
</head>
<body>
<div class="phone"><div class="notch"></div><div class="scr">
<div class="bar"><span>9:41</span><span>📶 🔋</span></div>
<div class="greet"><h1>Добрый день</h1><p>Пятница · 19 июня</p></div>

<div class="w summary">
<svg width="92" height="92" viewBox="0 0 110 110"><circle cx="55" cy="55" r="46" fill="none" stroke="rgba(220,90,150,.16)" stroke-width="10"/><circle cx="55" cy="55" r="46" fill="none" stroke="url(#R)" stroke-width="10" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="173" transform="rotate(-90 55 55)"/><defs><linearGradient id="R" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff9ec7"/><stop offset="1" stop-color="#d6437f"/></linearGradient></defs></svg>
<div><span class="pillday">Сегодня</span><h2>2 из 5</h2><div class="s" style="margin-top:4px">Осталось 3 привычки. Вода, чтение и кофе ждут. Ты молодец!</div></div>
</div>

<div class="w streak">
<svg viewBox="0 0 48 64" width="44" height="58"><defs><linearGradient id="FL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd0a8"/><stop offset=".4" stop-color="#ff7eb3"/><stop offset="1" stop-color="#d6437f"/></linearGradient></defs><path d="M24 1c5 13 17 17 13 33-2 9-8 14-13 18-5-4-11-9-13-18-2-8 3-13 5-19 1 6 4 9 7 11-3-9 1-17 1-25z" fill="url(#FL)"/><path d="M24 30c3 6 7 9 4 17-1 4-3 6-4 8-2-3-4-5-5-9-1-5 4-8 5-16z" fill="#fff" opacity=".55"/></svg>
<div style="flex:1">
<div class="row"><span class="num">21</span><span class="s">дней подряд</span></div>
<div class="days">
<div class="pd on">Пн</div><div class="pd on">Вт</div><div class="pd on">Ср</div><div class="pd on">Чт</div><div class="pd on">Пт</div><div class="pd off">Сб</div><div class="pd off">Вс</div>
</div>
</div>
</div>

<div class="grid">
<div class="w sq tile liquid" style="--lvl:80%;--c1:#ff9ec7;--c2:#e06a9c">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="t">📖 Читать</span><span class="streak-mini">21</span></div>
<div class="s" style="color:#fff;text-shadow:0 1px 2px rgba(150,40,90,.4)">80/100 стр</div>
</div>
</div>
<div class="w sq tile liquid" style="--lvl:60%;--c1:#ffb3d2;--c2:#ff7eb3">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="t">💧 Вода</span><span class="streak-mini">4</span></div>
<div class="s">1.2/2 л</div>
</div>
</div>
<div class="w wide tile" style="flex-direction:row;align-items:center;justify-content:space-between">
<div><div class="t">🏃 Зарядка</div><div class="s">Отметь выполнение · серия 14</div></div>
<div class="tap" onclick="this.classList.toggle('done')">✓</div>
</div>
<div class="w sq tile" style="justify-content:space-between">
<div class="row"><span class="t">🚭 Не курить</span><span class="streak-mini">8</span></div>
<div class="tap" onclick="this.classList.toggle('done')">✓</div>
</div>
<div class="w sq tile liquid" style="--lvl:50%;--c1:#ffc2d8;--c2:#ef89af">
<div class="wfill"></div>
<div class="content">
<div class="row"><span class="t">☕ Кофе</span><span class="streak-mini">3</span></div>
<div class="s">1 / ≤2 чашки</div>
</div>
</div>
</div>
</div></div>
</body>
</html>
